<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL | ADMIN TERMINAL</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #050505; --card: #111; --accent: #007bff; --danger: #ff3b30; --text: #eee; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; color: #888; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: white; }
        .nav-item i { margin-right: 10px; }

        /* Content */
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-card h1 { font-size: 35px; margin: 10px 0; color: var(--accent); }

        /* Tables & Lists */
        .admin-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 15px; overflow: hidden; }
        .admin-table th { text-align: left; padding: 15px; background: #1a1a1a; color: #555; text-transform: uppercase; font-size: 12px; }
        .admin-table td { padding: 15px; border-bottom: 1px solid #1a1a1a; }
        
        .btn-del { color: var(--danger); cursor: pointer; background: none; border: none; font-size: 18px; }
        .btn-ban { background: var(--danger); color: white; border: none; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 style="margin-bottom: 20px;">PIXEL TERMINAL</h1>
        <button onclick="login()" style="padding: 15px 40px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; background: white;">Войти как Админ</button>
        <p id="status" style="margin-top: 20px; color: gray;"></p>
    </div>

    <aside class="sidebar hidden" id="ui-side">
        <h2 style="margin-bottom: 30px; letter-spacing: 2px;">CONTROL</h2>
        <div class="nav-item active" onclick="showTab('stats')"><i class="bi bi-speedometer2"></i> Дашборд</div>
        <div class="nav-item" onclick="showTab('posts')"><i class="bi bi-chat-left-text"></i> Все Посты</div>
        <div class="nav-item" onclick="showTab('users')"><i class="bi bi-people"></i> Пользователи</div>
        <div class="nav-item" style="margin-top: auto; color: var(--danger)" onclick="location.reload()"><i class="bi bi-box-arrow-left"></i> Выход</div>
    </aside>

    <main class="main hidden" id="ui-main">
        <div id="tab-stats" class="tab-content">
            <div class="stats-row">
                <div class="stat-card"><h3>Онлайн</h3><h1 id="count-online">...</h1></div>
                <div class="stat-card"><h3>Всего постов</h3><h1 id="count-posts">...</h1></div>
                <div class="stat-card"><h3>Авторов</h3><h1 id="count-users">...</h1></div>
            </div>
            <div style="background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222;">
                <h3>Лог действий</h3>
                <p style="color: gray;">Система готова к работе...</p>
            </div>
        </div>

        <div id="tab-posts" class="tab-content hidden">
            <h2 style="margin-bottom: 20px;">Управление контентом</h2>
            <table class="admin-table">
                <thead><tr><th>Автор</th><th>Текст</th><th>Просмотры</th><th>Действие</th></tr></thead>
                <tbody id="admin-posts-list"></tbody>
            </table>
        </div>

        <div id="tab-users" class="tab-content hidden">
            <h2 style="margin-bottom: 20px;">База пользователей</h2>
            <table class="admin-table">
                <thead><tr><th>Имя</th><th>UID</th><th>Действие</th></tr></thead>
                <tbody id="admin-users-list"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ВСТАВЬ СВОЙ ID СЮДА ---
        const MY_ADMIN_ID = "FQKPKbUyofbmzXtAewzwXpEnMB53"; 

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());

        onAuthStateChanged(auth, u => {
            if(u) {
                if(u.uid === MY_ADMIN_ID) {
                    document.getElementById('lock-screen').classList.add('hidden');
                    document.getElementById('ui-side').classList.remove('hidden');
                    document.getElementById('ui-main').classList.remove('hidden');
                    loadData();
                } else {
                    document.getElementById('status').innerText = "ОТКАЗАНО: Вы не админ. UID: " + u.uid;
                }
            }
        });

        function loadData() {
            // Посты и общая стата
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                const posts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('count-posts').innerText = posts.length;
                
                const pList = document.getElementById('admin-posts-list');
                pList.innerHTML = "";
                posts.forEach(p => {
                    pList.innerHTML += `<tr>
                        <td><b>${p.author}</b></td>
                        <td style="color:gray">${p.text.substring(0,40)}...</td>
                        <td>${p.viewers?.length || 0}</td>
                        <td><button class="btn-del" onclick="deleteAnyPost('${p.id}')"><i class="bi bi-trash"></i></button></td>
                    </tr>`;
                });

                // Юзеры
                const uniqueUsers = [...new Map(posts.map(item => [item['uid'], item])).values()];
                document.getElementById('count-users').innerText = uniqueUsers.length;
                document.getElementById('count-online').innerText = Math.floor(uniqueUsers.length / 1.5) + 1; // Симуляция онлайна

                const uList = document.getElementById('admin-users-list');
                uList.innerHTML = "";
                uniqueUsers.forEach(u => {
                    uList.innerHTML += `<tr>
                        <td>${u.author}</td>
                        <td style="font-family:monospace; font-size:11px;">${u.uid}</td>
                        <td><button class="btn-ban" onclick="banUser('${u.uid}')">БАН</button></td>
                    </tr>`;
                });
            });
        }

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-'+id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        window.deleteAnyPost = async id => { if(confirm("УДАЛИТЬ ПОСТ НАВСЕГДА?")) await deleteDoc(doc(db, "posts", id)); };

        window.banUser = async uid => {
            if(confirm("ЗАБАНИТЬ ЭТОГО UID?")) {
                await addDoc(collection(db, "banned"), { uid: uid, date: serverTimestamp() });
                alert("Юзер забанен!");
            }
        };
    </script>
</body>
</html>

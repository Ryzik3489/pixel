<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL v3.1 Admin Integrated</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #0b0b0d; --panel: #1c1c1e; --accent: #007bff; --text: #ffffff; --gray: #8e8e93; --border: #2c2c2e; --danger: #ff453a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Меню */
        .sidebar { width: 260px; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .nav-btn { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: var(--gray); transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }
        
        /* Секретная кнопка */
        #admin-link { color: #ffd60a; display: none; border: 1px dashed #ffd60a; margin-top: 10px; }

        .main-content { flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .section { display: none; max-width: 650px; margin: 0 auto; padding: 20px; }
        .section.active { display: block; }

        /* Посты */
        .post { background: var(--panel); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        .post img { width: 100%; border-radius: 15px; margin-top: 12px; }
        
        /* Админка */
        .admin-card { background: #151517; border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .user-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; align-items: center; }
        .btn-ban { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="font-size: 20px; font-weight: 800; margin-bottom: 25px; padding-left: 15px;">ИТД</div>
        <div class="nav-btn active" onclick="nav('feed', this)"><i class="bi bi-house"></i> Лента</div>
        <div class="nav-btn" onclick="nav('notif', this)"><i class="bi bi-bell"></i> Уведомления</div>
        <div class="nav-btn" onclick="nav('profile', this)"><i class="bi bi-person"></i> Профиль</div>
        
        <div id="admin-link" class="nav-btn" onclick="nav('admin', this)"><i class="bi bi-shield-lock-fill"></i> АДМИНКА</div>

        <div class="nav-btn" style="margin-top:auto; color:var(--danger);" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Выход</div>
    </aside>

    <main class="main-content">
        <div id="sec-feed" class="section active">
            <div style="background:var(--panel); padding:20px; border-radius:25px; margin-bottom:20px;">
                <textarea id="post-text" placeholder="Что нового?" style="width:100%; background:none; border:none; color:white; outline:none; resize:none; font-size:18px;"></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    <label style="cursor:pointer; color:var(--gray);"><i class="bi bi-paperclip"></i><input type="file" id="post-img" hidden onchange="previewImg(this)"></label>
                    <button onclick="sendPost()" style="background:#fff; color:#000; border:none; padding:8px 20px; border-radius:20px; font-weight:bold;">Пост</button>
                </div>
                <img id="img-preview" style="width:100%; border-radius:10px; margin-top:10px; display:none;">
            </div>
            <div id="feed-items"></div>
        </div>

        <div id="sec-admin" class="section">
            <h2 style="margin-bottom:20px;">Панель управления</h2>
            <div class="admin-card">
                <div style="display:flex; gap:20px; text-align:center;">
                    <div><h3 id="adm-posts-count">0</h3><p style="color:gray; font-size:12px;">Постов</p></div>
                    <div><h3 id="adm-users-count">0</h3><p style="color:gray; font-size:12px;">Авторов</p></div>
                </div>
            </div>
            <h3>Пользователи</h3>
            <div id="admin-user-list" style="margin-top:15px;"></div>
        </div>

        <div id="sec-profile" class="section">
            <div id="profile-head" style="text-align:center; padding:30px;"></div>
            <div id="profile-items"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, serverTimestamp, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ВСТАВЬ СВОЙ UID СЮДА ---
        const MY_ADMIN_ID = "ТВОЙ_UID_ИЗ_КОНСОЛИ"; 
        let user = null, allPosts = [], currentImg = "";

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                console.log("Твой ID:", u.uid); // Посмотри это в консоли F12
                user = u;
                
                // Проверка на бан
                const b = await getDocs(query(collection(db, "banned"), where("uid", "==", u.uid)));
                if(!b.empty) { alert("ВЫ ЗАБАНЕНЫ!"); signOut(auth); location.reload(); return; }

                if(u.uid === MY_ADMIN_ID) document.getElementById('admin-link').style.display = 'flex';
                init();
            } else { signInWithPopup(auth, new GoogleAuthProvider()); }
        });

        window.logout = () => signOut(auth).then(() => location.reload());

        window.nav = (id, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
            btn.classList.add('active');
            if(id === 'admin') updateAdminUI();
            if(id === 'profile') render(allPosts.filter(p => p.uid === user.uid), 'profile-items');
        };

        function init() {
            document.getElementById('profile-head').innerHTML = `<img src="${user.photoURL}" style="width:80px; border-radius:50%; border:2px solid #333;"><h2>${user.displayName}</h2>`;
            
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(allPosts, 'feed-items');
            });
        }

        function render(data, target) {
            const cont = document.getElementById(target);
            cont.innerHTML = "";
            data.forEach(p => {
                const isAdmin = user.uid === MY_ADMIN_ID;
                const isLiked = p.likes?.includes(user.uid);
                cont.innerHTML += `
                    <div class="post">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <div style="display:flex; gap:8px; align-items:center;">
                                <div style="width:30px; height:30px; border-radius:50%; background:url(${p.av}); background-size:cover;"></div>
                                <b>${p.author}</b>
                            </div>
                            ${(p.uid === user.uid || isAdmin) ? `<i class="bi bi-trash" style="color:red; cursor:pointer;" onclick="deletePost('${p.id}')"></i>` : ''}
                        </div>
                        <div>${p.text}</div>
                        ${p.img ? `<img src="${p.img}">` : ''}
                        <div style="display:flex; gap:20px; margin-top:15px; color:gray;">
                            <span onclick="toggleLike('${p.id}')" style="cursor:pointer"><i class="bi ${isLiked?'bi-heart-fill':'bi-heart'}" style="${isLiked?'color:red':''}"></i> ${p.likes?.length || 0}</span>
                            <span><i class="bi bi-graph-up"></i> ${p.viewers?.length || 0}</span>
                        </div>
                    </div>`;
                if(!p.viewers?.includes(user.uid)) updateDoc(doc(db, "posts", p.id), { viewers: arrayUnion(user.uid) });
            });
        }

        window.updateAdminUI = () => {
            document.getElementById('adm-posts-count').innerText = allPosts.length;
            const users = [...new Set(allPosts.map(p => p.uid))];
            document.getElementById('adm-users-count').innerText = users.length;
            
            const list = document.getElementById('admin-user-list');
            list.innerHTML = "";
            const uniqueAuthors = [...new Map(allPosts.map(item => [item['uid'], item])).values()];
            uniqueAuthors.forEach(u => {
                list.innerHTML += `<div class="user-item">
                    <span>${u.author} <small style="color:gray;">(${u.uid.substring(0,6)}...)</small></span>
                    <button class="btn-ban" onclick="banUser('${u.uid}')">БАН</button>
                </div>`;
            });
        };

        window.banUser = async (uid) => {
            if(confirm("ЗАБАНИТЬ НАВСЕГДА?")) {
                await addDoc(collection(db, "banned"), { uid: uid, at: serverTimestamp() });
                alert("Пользователь заблокирован!");
            }
        };

        window.deletePost = async id => { if(confirm("Удалить пост?")) await deleteDoc(doc(db, "posts", id)); };

        window.toggleLike = async id => {
            const p = allPosts.find(x => x.id === id);
            const isLiked = p.likes?.includes(user.uid);
            await updateDoc(doc(db, "posts", id), { likes: isLiked ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };

        window.sendPost = async () => {
            const t = document.getElementById('post-text').value;
            if(!t && !currentImg) return;
            await addDoc(collection(db, "posts"), { text: t, img: currentImg, author: user.displayName, av: user.photoURL, uid: user.uid, likes: [], viewers: [user.uid], time: serverTimestamp() });
            document.getElementById('post-text').value = ""; document.getElementById('img-preview').style.display = 'none'; currentImg = "";
        };

        window.previewImg = (i) => {
            const r = new FileReader();
            r.onload = e => { currentImg = e.target.result; document.getElementById('img-preview').src = currentImg; document.getElementById('img-preview').style.display = 'block'; };
            r.readAsDataURL(i.files[0]);
        };
    </script>
</body>
</html>

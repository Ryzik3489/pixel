<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Ultra</title>
    <style>
        :root {
            --bg: #f4f4f7; --sidebar: #ffffff; --text: #1c1e21; --accent: #0084ff;
            --msg-me: #0084ff; --msg-other: #ffffff; --panel: #f0f2f5;
        }
        [data-theme="dark"] {
            --bg: #0e1621; --sidebar: #17212b; --text: #f5f5f5; --accent: #5288c1;
            --msg-me: #2b5278; --msg-other: #182533; --panel: #242f3d;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- Навигация (Папки) --- */
        .tabs { display: flex; background: var(--sidebar); border-bottom: 1px solid rgba(0,0,0,0.1); justify-content: space-around; padding: 10px 0; }
        .tab { cursor: pointer; opacity: 0.6; font-weight: 500; font-size: 14px; transition: 0.2s; border-bottom: 2px solid transparent; padding-bottom: 5px; }
        .tab.active { opacity: 1; border-color: var(--accent); color: var(--accent); }

        /* --- Сайдбар --- */
        #side-menu {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: var(--sidebar); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }
        #side-menu.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }

        /* --- Профиль в меню --- */
        .user-cover { padding: 30px 20px; background: var(--accent); color: white; }
        .emoji-status { font-size: 24px; margin-bottom: 10px; display: block; }

        /* --- Список чатов --- */
        #chat-list { flex: 1; overflow-y: auto; background: var(--sidebar); }
        .chat-card { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .chat-card:hover { background: rgba(0,0,0,0.03); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #ccc; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }

        /* --- Сообщения --- */
        #main-screen { display: none; flex-direction: row; height: 100vh; }
        #chat-area { flex: 3; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }

        .msg-bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; margin: 4px 0; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-bubble.me { align-self: flex-end; background: var(--msg-me); color: white; border-bottom-right-radius: 2px; }
        .msg-bubble.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 2px; }

        /* --- Панель ввода --- */
        #input-panel { padding: 10px 15px; background: var(--sidebar); display: flex; align-items: center; gap: 10px; }
        #msg-input { flex: 1; border: none; padding: 10px 15px; border-radius: 20px; background: var(--panel); color: var(--text); outline: none; }
    </style>
</head>
<body>

<div id="side-menu">
    <div class="user-cover">
        <span class="emoji-status" id="my-emoji">💻</span>
        <strong id="my-name">Илья</strong><br>
        <small id="my-phone">+7 ...</small>
    </div>
    <div style="padding: 10px;">
        <div class="menu-item" onclick="createRoom('group')">👥 Создать группу</div>
        <div class="menu-item" onclick="createRoom('channel')">📢 Создать канал</div>
        <div class="menu-item" onclick="toggleTheme()">🌙 Темная тема</div>
    </div>
</div>
<div class="overlay" onclick="closeMenu()"></div>

<div id="app">
    <div id="auth-screen" style="padding: 50px; text-align: center;">
        <h2>Pixel Messenger</h2>
        <div id="recaptcha-container"></div>
        <input type="tel" id="phone" placeholder="+7...">
        <button onclick="sendOTP()">Начать общение</button>
    </div>

    <div id="main-screen">
        <div style="flex: 1.2; display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.1);">
            <header style="padding: 15px; background: var(--sidebar); font-weight: bold; display: flex; justify-content: space-between;">
                <span onclick="openMenu()" style="cursor:pointer">☰ Pixel</span>
            </header>
            <div class="tabs">
                <div class="tab active" onclick="filterChats('all', this)">Все</div>
                <div class="tab" onclick="filterChats('group', this)">Группы</div>
                <div class="tab" onclick="filterChats('channel', this)">Каналы</div>
            </div>
            <div id="chat-list"></div>
        </div>

        <div id="chat-area">
            <header id="chat-header" style="padding: 10px 20px; background: var(--sidebar); border-bottom: 1px solid rgba(0,0,0,0.1);">
                <strong id="active-chat-name">Выберите чат</strong>
            </header>
            <div id="messages"></div>
            <div id="input-panel" style="display: none;">
                <input type="text" id="msg-input" placeholder="Напишите что-нибудь...">
                <button onclick="sendMsg()" id="send-btn">🔵</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
        authDomain: "pixel-7c9f0.firebaseapp.com",
        projectId: "pixel-7c9f0",
        storageBucket: "pixel-7c9f0.firebasestorage.app",
        messagingSenderId: "1016081455742",
        appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let activeChatId = null;
    let activeChatType = 'group';

    // Меню
    window.openMenu = () => { document.getElementById('side-menu').classList.add('active'); document.querySelector('.overlay').classList.add('active'); };
    window.closeMenu = () => { document.getElementById('side-menu').classList.remove('active'); document.querySelector('.overlay').classList.remove('active'); };

    // Авторизация
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {'size': 'invisible'});
    window.sendOTP = async () => {
        const phone = document.getElementById('phone').value;
        const confirmation = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
        const code = prompt("Код:");
        const result = await confirmation.confirm(code);
        startApp(result.user);
    };

    function startApp(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'flex';
        document.getElementById('my-phone').innerText = user.phoneNumber;
        loadChatList();
    }

    // Создание чата/канала
    window.createRoom = async (type) => {
        const name = prompt(type === 'group' ? "Название группы:" : "Название канала:");
        if(!name) return;
        await addDoc(collection(db, "rooms"), {
            name, type, creator: auth.currentUser.uid, timestamp: serverTimestamp()
        });
        closeMenu();
    };

    // Загрузка списка чатов
    function loadChatList(filter = 'all') {
        const q = query(collection(db, "rooms"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                if(filter !== 'all' && data.type !== filter) return;
                
                const card = document.createElement('div');
                card.className = 'chat-card';
                card.onclick = () => selectChat(d.id, data.name, data.type, data.creator);
                card.innerHTML = `
                    <div class="avatar" style="background: ${data.type === 'channel' ? '#f39c12' : '#2ecc71'}">
                        ${data.name[0]}
                    </div>
                    <div>
                        <strong>${data.name}</strong><br>
                        <small>${data.type === 'channel' ? 'канал' : 'группа'}</small>
                    </div>
                `;
                list.appendChild(card);
            });
        });
    }

    window.filterChats = (type, el) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        loadChatList(type);
    };

    // Выбор чата
    function selectChat(id, name, type, creator) {
        activeChatId = id;
        activeChatType = type;
        document.getElementById('active-chat-name').innerText = name;
        document.getElementById('messages').innerHTML = "";
        
        // В каналах писать может только создатель
        const canWrite = type === 'group' || creator === auth.currentUser.uid;
        document.getElementById('input-panel').style.display = canWrite ? 'flex' : 'none';
        if(!canWrite) document.getElementById('chat-header').innerHTML += " <small>(Только для чтения)</small>";
        
        loadMessages(id);
    }

    function loadMessages(roomId) {
        const q = query(collection(db, `rooms/${roomId}/messages`), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const container = document.getElementById('messages');
            container.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.uid === auth.currentUser.uid;
                container.innerHTML += `
                    <div class="msg-bubble ${isMe ? 'me' : 'other'}">
                        <div style="font-size: 10px; opacity: 0.7;">${m.sender}</div>
                        ${m.text}
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    window.sendMsg = async () => {
        const text = document.getElementById('msg-input').value;
        if(!text.trim() || !activeChatId) return;
        await addDoc(collection(db, `rooms/${activeChatId}/messages`), {
            text, uid: auth.currentUser.uid, sender: auth.currentUser.phoneNumber, timestamp: serverTimestamp()
        });
        document.getElementById('msg-input').value = "";
    };

    window.toggleTheme = () => {
        document.body.getAttribute('data-theme') === 'dark' ? 
        document.body.removeAttribute('data-theme') : 
        document.body.setAttribute('data-theme', 'dark');
        closeMenu();
    };
</script>
</body>
</html>

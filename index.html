<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL Social Network</title>
    <style>
        :root {
            --bg-dark: #333333;
            --panel-gray: #8c8c8c;
            --button-gray: #6e6e6e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: var(--bg-dark); display: flex; justify-content: center; padding: 20px; color: white; height: 100vh; }
        .container { display: flex; width: 100%; max-width: 1200px; gap: 20px; height: 95vh; }

        /* Левая панель */
        .sidebar { background: var(--panel-gray); width: 280px; border-radius: 35px; padding: 25px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .logo-box { background: var(--button-gray); border-radius: 20px; padding: 25px; text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 4px; color: white; }
        
        .nav-btn { background: var(--button-gray); border: none; border-radius: 20px; padding: 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: black; }
        .nav-btn:hover { background: #555; color: white; }
        
        /* Правая панель */
        .main-content { flex-grow: 1; background: var(--panel-gray); border-radius: 35px; padding: 25px; overflow-y: auto; color: black; }
        .post { background: var(--button-gray); border-radius: 25px; padding: 20px; margin-bottom: 15px; color: white; }
        .search-box { width: 100%; padding: 15px; border-radius: 20px; border: none; margin-bottom: 20px; background: #eee; }

        /* Модалка */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--panel-gray); padding: 40px; border-radius: 40px; width: 350px; text-align: center; position: relative; }
        .auth-btn { width: 100%; padding: 15px; margin-bottom: 12px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; color: white; }
        .btn-google { background: #db4437; } .btn-github { background: #333; }
        
        #user-info { text-align: center; background: #555; border-radius: 20px; padding: 10px; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo-box">PIXEL</div>
            
            <button id="login-btn" class="nav-btn" onclick="openModal()">ВХОД <span>👤</span></button>
            
            <div id="user-info" style="display:none;">
                <span id="display-name"></span>
                <button onclick="logout()" style="background:none; border:none; color:cyan; cursor:pointer; margin-left:10px;">Выйти</button>
            </div>

            <button class="nav-btn" onclick="showSection('posts')">ПОСТЫ <span>+</span></button>
            <a href="https://world-pixel-ten.vercel.app/" class="nav-btn">ИНВЕНТ <span>📦</span></a>
            <button class="nav-btn" onclick="showSection('search')">ПОИСК <span>🔍</span></button>
        </aside>

        <main class="main-content">
            <div id="search-section" style="display:none;">
                <input type="text" class="search-box" placeholder="Поиск пользователей или постов...">
            </div>

            <div id="posts-section">
                <div id="feed">Загрузка постов...</div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <div style="color:black; font-weight:bold; margin-bottom:20px;">АВТОРИЗАЦИЯ</div>
            <button class="auth-btn btn-google" onclick="login('google')">GOOGLE</button>
            <button class="auth-btn btn-github" onclick="login('github')">GITHUB</button>
            <button onclick="closeModal()" style="margin-top:10px; cursor:pointer; border:none; background:none;">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, GithubAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Управление разделами ---
        window.showSection = (name) => {
            document.getElementById('search-section').style.display = name === 'search' ? 'block' : 'none';
            document.getElementById('posts-section').style.display = name === 'posts' ? 'block' : 'none';
        };

        // --- Аутентификация ---
        window.openModal = () => document.getElementById('authModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('authModal').style.display = 'none';
        
        window.login = async (type) => {
            const provider = type === 'google' ? new GoogleAuthProvider() : new GithubAuthProvider();
            try { await signInWithPopup(auth, provider); closeModal(); } catch(e) { alert(e.message); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            const displayName = document.getElementById('display-name');

            if (user) {
                loginBtn.style.display = 'none'; // Скрываем кнопку входа
                userInfo.style.display = 'block'; // Показываем имя
                displayName.innerText = user.displayName || user.email;
            } else {
                loginBtn.style.display = 'flex';
                userInfo.style.display = 'none';
            }
            loadPosts();
        });

        // --- Загрузка постов ---
        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    feed.innerHTML += `
                        <div class="post">
                            <div style="font-size:12px; margin-bottom:8px; opacity:0.7;">@${p.authorName || 'user'}</div>
                            <p>${p.text}</p>
                            ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%; border-radius:15px; margin-top:10px;">` : ''}
                        </div>`;
                });
                if(snap.empty) feed.innerHTML = "Постов пока нет. Будь первым!";
            });
        }
    </script>
</body>
</html>

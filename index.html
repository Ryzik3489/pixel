<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL v1.1 Beta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #0b0b0d; --sidebar-bg: #161618; --panel: #1c1c1e;
            --accent: #007bff; --text: #ffffff; --gray: #8e8e93; --border: #2c2c2e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR (ИНТЕРФЕЙС ИЗ ТВОИХ ФОТО) */
        .sidebar { width: 260px; background: var(--bg); padding: 25px 15px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid var(--border); }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 30px; padding-left: 15px; display: flex; align-items: center; gap: 10px; }
        .logo span { font-size: 12px; color: var(--gray); font-weight: normal; }

        .nav-btn { 
            display: flex; align-items: center; gap: 15px; padding: 12px 15px; 
            border-radius: 12px; cursor: pointer; color: var(--gray); transition: 0.2s;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }
        .nav-btn i { font-size: 18px; }

        /* MAIN */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        
        /* TABS */
        .tabs { display: flex; justify-content: center; gap: 40px; padding: 20px; border-bottom: 1px solid var(--border); }
        .tab { color: var(--gray); cursor: pointer; font-size: 14px; padding-bottom: 5px; }
        .tab.active { color: var(--text); border-bottom: 2px solid var(--text); }

        /* EDITOR */
        .editor-container { padding: 30px; display: flex; justify-content: center; border-bottom: 1px solid var(--border); }
        .editor-card { background: var(--panel); width: 100%; max-width: 600px; border-radius: 20px; padding: 20px; }
        .editor-top { display: flex; gap: 15px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; background-size: cover; flex-shrink: 0; }
        textarea { width: 100%; background: none; border: none; color: white; resize: none; outline: none; font-size: 16px; margin-top: 10px; }
        .editor-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .editor-icons { display: flex; gap: 20px; color: var(--gray); font-size: 18px; }
        .btn-pub { background: #d1d1d6; color: black; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* FEED */
        .feed { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .post { background: var(--panel); width: 100%; max-width: 600px; border-radius: 20px; padding: 20px; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .post-actions { display: flex; gap: 20px; margin-top: 15px; color: var(--gray); font-size: 14px; }
        .action:hover { color: var(--text); cursor: pointer; }

        /* COMMENTS */
        .comment-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border); display: none; }
        .comment-input { background: var(--bg); border: 1px solid var(--border); color: white; width: 100%; padding: 8px; border-radius: 10px; margin-bottom: 10px; }

        /* SECTIONS */
        .section { display: none; width: 100%; height: 100%; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">ИТД <span>v1.1 beta</span></div>
        <div class="nav-btn active" onclick="nav('feed')"><i class="bi bi- house-door-fill"></i> Лента</div>
        <div class="nav-btn" onclick="nav('search')"><i class="bi bi-search"></i> Поиск</div>
        <a href="https://world-pixel-ten.vercel.app/" style="text-decoration:none">
            <div class="nav-btn"><i class="bi bi-box-seam"></i> Ивент</div>
        </a>
        <div class="nav-btn" onclick="nav('notif')"><i class="bi bi-bell"></i> Уведомления</div>
        <div class="nav-btn" onclick="nav('profile')"><i class="bi bi-person"></i> Профиль</div>
        
        <div class="nav-btn" style="margin-top:auto; color: #ff3b30" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Выйти</div>
    </aside>

    <main class="main-content">
        <div class="tabs">
            <div class="tab active">Для вас</div>
            <div class="tab">Лента кланов</div>
            <div class="tab">Подписки</div>
        </div>

        <div id="sec-feed" class="section active">
            <div class="editor-container" id="editor-ui" style="display:none">
                <div class="editor-card">
                    <div class="editor-top">
                        <div class="avatar my-av"></div>
                        <textarea id="post-text" placeholder="Что нового?"></textarea>
                    </div>
                    <div class="editor-bottom">
                        <div class="editor-icons">
                            <i class="bi bi-paperclip" onclick="alert('Выбери прямую ссылку на фото и вставь в текст')"></i>
                            <i class="bi bi-emoji-smile"></i>
                            <i class="bi bi-palette"></i>
                            <i class="bi bi-bar-chart"></i>
                        </div>
                        <button class="btn-pub" onclick="sendPost()">Опубликовать</button>
                    </div>
                </div>
            </div>
            <div class="feed" id="feed-items">Загрузка...</div>
        </div>

        <div id="sec-search" class="section" style="padding:40px;">
            <input type="text" id="search-input" oninput="searchPosts(this.value)" placeholder="Поиск постов или людей..." class="comment-input" style="padding:15px; font-size:18px;">
            <div id="search-results" class="feed"></div>
        </div>

        <div id="sec-profile" class="section" style="padding:40px; text-align:center;">
            <div class="avatar my-av" style="width:100px; height:100px; margin: 0 auto 20px;"></div>
            <h2 id="user-display">Аноним</h2>
            <button class="btn-pub" style="margin-top:20px; background:#ff3b30; color:white;" onclick="blockAccount()">ЗАБЛОКИРОВАТЬ АККАУНТ</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.appspot.com",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;
        let allPosts = [];

        // Навигация
        window.nav = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if(u) {
                document.getElementById('editor-ui').style.display = 'flex';
                document.getElementById('user-display').innerText = u.displayName;
                document.querySelectorAll('.my-av').forEach(a => a.style.backgroundImage = `url(${u.photoURL})`);
            } else {
                signInWithPopup(auth, new GoogleAuthProvider());
            }
            initFeed();
        });

        function initFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(allPosts, 'feed-items');
            });
        }

        function render(data, targetId) {
            const container = document.getElementById(targetId);
            container.innerHTML = "";
            data.forEach(p => {
                const liked = user && p.likes?.includes(user.uid);
                container.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <div style="display:flex; gap:10px; align-items:center">
                                <div class="avatar" style="background-image:url(${p.av})"></div>
                                <b>${p.author}</b>
                            </div>
                            <i class="bi bi-three-dots"></i>
                        </div>
                        <div>${p.text}</div>
                        <div class="post-actions">
                            <span class="action" onclick="toggleLike('${p.id}', ${JSON.stringify(p.likes || [])})">
                                <i class="bi ${liked ? 'bi-heart-fill' : 'bi-heart'}" style="${liked ? 'color:red' : ''}"></i> ${p.likes?.length || 0}
                            </span>
                            <span class="action" onclick="toggleComments('${p.id}')"><i class="bi bi-chat"></i> ${p.comments?.length || 0}</span>
                            <span class="action"><i class="bi bi-share"></i></span>
                        </div>
                        <div id="comments-${p.id}" class="comment-section">
                            <input class="comment-input" placeholder="Написать комментарий..." onkeydown="if(event.key==='Enter') addComment('${p.id}', this.value)">
                            <div id="list-${p.id}">${(p.comments || []).map(c => `<div style="font-size:12px; margin-bottom:5px"><b>${c.user}:</b> ${c.text}</div>`).join('')}</div>
                        </div>
                    </div>`;
            });
        }

        window.toggleLike = async (id, likes) => {
            const ref = doc(db, "posts", id);
            await updateDoc(ref, { likes: likes.includes(user.uid) ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };

        window.toggleComments = (id) => {
            const el = document.getElementById('comments-' + id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        };

        window.addComment = async (id, text) => {
            if(!text.trim()) return;
            const ref = doc(db, "posts", id);
            await updateDoc(ref, { comments: arrayUnion({ user: user.displayName, text, time: Date.now() }) });
        };

        window.sendPost = async () => {
            const text = document.getElementById('post-text').value;
            if(!text.trim()) return;
            await addDoc(collection(db, "posts"), {
                text, author: user.displayName, av: user.photoURL, uid: user.uid,
                likes: [], comments: [], time: serverTimestamp()
            });
            document.getElementById('post-text').value = "";
        };

        window.searchPosts = (val) => render(allPosts.filter(p => p.text.toLowerCase().includes(val.toLowerCase())), 'search-results');
        
        window.blockAccount = () => {
            if(confirm("Вы уверены, что хотите деактивировать аккаунт?")) {
                document.body.innerHTML = `<div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0b0b0d; color:white;">
                    <h1>Your account has been deactivated</h1>
                    <button onclick="location.reload()" style="background:#007bff; color:white; border:none; padding:10px 30px; border-radius:10px; margin-top:20px; cursor:pointer;">Повторить</button>
                </div>`;
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL v1.2 Beta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #0b0b0d; --panel: #1c1c1e; --accent: #007bff; --text: #ffffff; --gray: #8e8e93; --border: #2c2c2e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 260px; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 30px; padding-left: 15px; color: var(--text); letter-spacing: 2px; }
        
        .nav-btn { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: var(--gray); transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .tabs { display: flex; justify-content: center; gap: 40px; padding: 20px; border-bottom: 1px solid var(--border); }
        .tab { color: var(--gray); cursor: pointer; font-size: 14px; transition: 0.3s; }
        .tab.active { color: var(--text); border-bottom: 2px solid var(--text); padding-bottom: 5px; }

        .editor-card { background: var(--panel); width: 100%; max-width: 600px; border-radius: 20px; padding: 20px; margin: 20px auto; }
        textarea { width: 100%; background: none; border: none; color: white; resize: none; outline: none; font-size: 16px; }
        
        .poll-editor { margin: 10px 0; display: none; border: 1px dashed var(--gray); padding: 10px; border-radius: 10px; }
        .poll-input { background: var(--bg); border: 1px solid var(--border); color: white; width: 100%; padding: 5px; margin-top: 5px; border-radius: 5px; }

        .post { background: var(--panel); width: 100%; max-width: 600px; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .post-actions { display: flex; gap: 20px; margin-top: 15px; color: var(--gray); }
        
        .notif-item { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .section { display: none; height: 100%; overflow-y: auto; scrollbar-width: none; }
        .section.active { display: block; }

        .btn-pub { background: #ffffff; color: black; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">PIXEL <span>v1.2</span></div>
        <div class="nav-btn active" onclick="nav('feed')"><i class="bi bi-house-door-fill"></i> Лента</div>
        <div class="nav-btn" onclick="nav('search')"><i class="bi bi-search"></i> Поиск</div>
        <div class="nav-btn" onclick="nav('notif')"><i class="bi bi-bell"></i> Уведомления</div>
        <div class="nav-btn" onclick="nav('profile')"><i class="bi bi-person"></i> Профиль</div>
    </aside>

    <main class="main-content">
        <div class="tabs">
            <div class="tab active" onclick="setTab(this)">Для вас</div>
            <div class="tab" onclick="setTab(this)">Подписки</div>
        </div>

        <div id="sec-feed" class="section active">
            <div class="editor-card">
                <textarea id="post-text" placeholder="Что нового?"></textarea>
                <div id="poll-ui" class="poll-editor">
                    <input type="text" id="poll-q" class="poll-input" placeholder="Вопрос опроса">
                    <input type="text" id="poll-o1" class="poll-input" placeholder="Вариант 1">
                    <input type="text" id="poll-o2" class="poll-input" placeholder="Вариант 2">
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                    <div style="display:flex; gap:15px; color:var(--gray); cursor:pointer;">
                        <i class="bi bi-bar-chart" onclick="document.getElementById('poll-ui').style.display='block'"></i>
                        <i class="bi bi-emoji-smile"></i>
                    </div>
                    <button class="btn-pub" onclick="sendPost()">Опубликовать</button>
                </div>
            </div>
            <div id="feed-items" style="display:flex; flex-direction:column; align-items:center;"></div>
        </div>

        <div id="sec-notif" class="section">
            <h3 style="padding:20px;">Уведомления</h3>
            <div id="notif-list"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        window.nav = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
        };

        window.setTab = (el) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        };

        onAuthStateChanged(auth, (u) => {
            if(u) { user = u; initApp(); } 
            else { signInWithPopup(auth, new GoogleAuthProvider()); }
        });

        async function notify(type, authorId, postText) {
            if(authorId === user.uid) return;
            await addDoc(collection(db, "notifs"), {
                to: authorId,
                from: user.displayName,
                type: type,
                text: postText.substring(0, 20),
                time: Date.now()
            });
        }

        window.sendPost = async () => {
            const text = document.getElementById('post-text').value;
            const pollQ = document.getElementById('poll-q').value;
            if(!text.trim()) return;
            
            await addDoc(collection(db, "posts"), {
                text, author: user.displayName, av: user.photoURL, uid: user.uid,
                poll: pollQ ? { q: pollQ, o1: document.getElementById('poll-o1').value, o2: document.getElementById('poll-o2').value, v1:0, v2:0 } : null,
                likes: [], comments: [], time: serverTimestamp()
            });
            document.getElementById('post-text').value = "";
            document.getElementById('poll-ui').style.display = 'none';
        };

        function initApp() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                const f = document.getElementById('feed-items');
                f.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    f.innerHTML += `
                        <div class="post">
                            <div class="post-header">
                                <div style="display:flex; gap:10px; align-items:center">
                                    <div style="width:35px; height:35px; border-radius:50%; background:url(${p.av}); background-size:cover"></div>
                                    <b>${p.author}</b>
                                </div>
                                ${p.uid !== user.uid ? `<i class="bi bi-slash-circle" style="color:red; cursor:pointer" onclick="blockUser('${p.author}')"></i>` : ''}
                            </div>
                            <div>${p.text}</div>
                            ${p.poll ? `<div style="background:#0b0b0d; padding:10px; border-radius:10px; margin-top:10px">
                                <b>${p.poll.q}</b><br>
                                <button class="poll-input" onclick="alert('Голос принят')">${p.poll.o1}</button>
                                <button class="poll-input" onclick="alert('Голос принят')">${p.poll.o2}</button>
                            </div>` : ''}
                            <div class="post-actions">
                                <span onclick="like('${d.id}', '${p.uid}', '${p.text}')"><i class="bi bi-heart"></i> ${p.likes?.length || 0}</span>
                                <span onclick="notify('репост', '${p.uid}', '${p.text}')"><i class="bi bi-repeat"></i></span>
                            </div>
                        </div>`;
                });
            });

            onSnapshot(query(collection(db, "notifs"), orderBy("time", "desc")), (snap) => {
                const l = document.getElementById('notif-list');
                l.innerHTML = "";
                snap.forEach(d => {
                    const n = d.data();
                    if(n.to === user.uid) {
                        l.innerHTML += `<div class="notif-item"><b>${n.from}</b> поставил ${n.type} на ваш пост: "${n.text}..."</div>`;
                    }
                });
            });
        }

        window.like = async (id, authorId, text) => {
            await updateDoc(doc(db, "posts", id), { likes: arrayUnion(user.uid) });
            notify('лайк', authorId, text);
        };

        window.blockUser = (name) => { if(confirm(`Заблокировать пользователя ${name}?`)) alert('Пользователь заблокирован'); };
    </script>
</body>
</html>

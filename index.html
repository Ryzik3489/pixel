<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Ultra | Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

    <div id="side-menu">
        <div class="user-cover">
            <span id="my-emoji">👤</span>
            <strong id="my-name">Загрузка...</strong><br>
            <small id="my-phone">...</small>
        </div>
        <div class="menu-content">
            <div class="menu-item" id="btn-create-group">👥 Создать группу</div>
            <div class="menu-item" id="btn-create-channel">📢 Создать канал</div>
            <div class="menu-item" id="btn-profile-settings">⚙️ Профиль</div>
            <div class="menu-item" id="btn-toggle-theme">🌓 Сменить тему</div>
        </div>
    </div>
    
    <div class="overlay" id="menu-overlay"></div>

    <div id="app">
        <div id="auth-screen">
            <div class="auth-card">
                <h1>Pixel</h1>
                <p>Введите номер для входа</p>
                <div id="recaptcha-container"></div>
                <input type="tel" id="phone" placeholder="+7 777 000 0000">
                <button id="btn-send-otp">Отправить SMS</button>
                
                <div id="otp-box" style="display:none; margin-top: 15px;">
                    <input type="text" id="otp-code" placeholder="Код подтверждения">
                    <button id="btn-verify-otp">Войти в Pixel</button>
                </div>
            </div>
        </div>

        <div id="main-screen" style="display:none">
            
            <div class="sidebar-chats">
                <header class="chat-list-header">
                    <div class="menu-trigger" id="open-menu">☰</div>
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="Поиск @юзера или чата...">
                    </div>
                </header>
                
                <nav class="tabs">
                    <div class="tab active" data-type="all">Все</div>
                    <div class="tab" data-type="group">Группы</div>
                    <div class="tab" data-type="channel">Каналы</div>
                </nav>

                <div id="chat-list">
                    </div>
            </div>

            <div class="chat-view">
                <header id="chat-header">
                    <div class="chat-info">
                        <h3 id="active-title">Выберите, кому написать</h3>
                        <span id="chat-status">в сети</span>
                    </div>
                    <button id="btn-add-member" style="display:none" title="Добавить в группу">+</button>
                </header>

                <div id="messages-area">
                    </div>

                <div id="input-area" style="display:none">
                    <button class="attach-btn">📎</button>
                    <input type="text" id="message-input" placeholder="Напишите сообщение...">
                    <button id="btn-send">Отправить</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

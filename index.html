<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL v1.3 FREE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #0b0b0b; --panel: #161616; --accent: #00ffcc; --text: #e7e9ea; --border: #2f3336; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .container { display: flex; width: 100%; max-width: 1200px; }
        .sidebar { width: 260px; padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--accent); margin-bottom: 20px; }

        .nav-item { padding: 12px 20px; border-radius: 25px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); }

        .main { flex-grow: 1; overflow-y: auto; border-right: 1px solid var(--border); scrollbar-width: none; }
        .editor { padding: 20px; border-bottom: 1px solid var(--border); }
        input, textarea { width: 100%; background: #222; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; outline: none; }
        
        .post { padding: 20px; border-bottom: 1px solid var(--border); }
        .post-img { width: 100%; border-radius: 15px; margin-top: 10px; }
        .btn { background: var(--accent); color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Модалка профиля */
        #prof-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
        .prof-box { background: var(--panel); padding: 30px; border-radius: 25px; width: 350px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo">PIXEL 1.3</div>
            <div class="nav-item" onclick="show('feed')"><i class="bi bi-house"></i> Лента</div>
            <div class="nav-item" onclick="show('profile')"><i class="bi bi-person"></i> Профиль</div>
            <a href="https://world-pixel-ten.vercel.app/" style="text-decoration:none; color:inherit;">
                <div class="nav-item"><i class="bi bi-box-seam"></i> Инвент</div>
            </a>
            <button class="btn" id="login-btn" onclick="login()" style="margin-top:auto">Войти</button>
        </aside>

        <main class="main">
            <div class="editor" id="editor" style="display:none">
                <textarea id="msg" placeholder="Что нового?"></textarea>
                <input type="text" id="img-url" placeholder="Ссылка на фото (URL)">
                <button class="btn" onclick="send()">Опубликовать</button>
            </div>
            <div id="feed"></div>
        </main>
    </div>

    <div id="prof-modal">
        <div class="prof-box">
            <div id="p-avatar" style="width:80px; height:80px; border-radius:50%; background:#444; margin: 0 auto 15px; background-size:cover"></div>
            <h3 id="p-name">Имя</h3>
            <p id="p-email" style="font-size:12px; color:gray; margin-bottom:20px"></p>
            <input type="text" id="new-av" placeholder="URL новой иконки">
            <button class="btn" onclick="updateAv()">Сменить иконку</button>
            <button class="btn" style="background:gray; margin-top:10px" onclick="document.getElementById('prof-modal').style.display='none'">Закрыть</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.appspot.com",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.show = (m) => { if(m === 'profile' && user) document.getElementById('prof-modal').style.display='flex'; };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if(u) {
                document.getElementById('editor').style.display = 'block';
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('p-name').innerText = u.displayName;
                document.getElementById('p-email').innerText = u.email;
                document.getElementById('p-avatar').style.backgroundImage = `url(${u.photoURL})`;
            }
            load();
        });

        window.updateAv = async () => {
            const url = document.getElementById('new-av').value;
            if(url) {
                await updateProfile(auth.currentUser, { photoURL: url });
                location.reload();
            }
        };

        window.send = async () => {
            const text = document.getElementById('msg').value;
            const img = document.getElementById('img-url').value;
            if(!text) return;
            await addDoc(collection(db, "posts"), {
                text, img, author: user.displayName, av: user.photoURL, time: serverTimestamp()
            });
            document.getElementById('msg').value = "";
            document.getElementById('img-url').value = "";
        };

        function load() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                const f = document.getElementById('feed');
                f.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    f.innerHTML += `
                        <div class="post">
                            <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px">
                                <div style="width:30px; height:30px; border-radius:50%; background:url(${p.av}); background-size:cover"></div>
                                <b>${p.author}</b>
                            </div>
                            <div>${p.text}</div>
                            ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>

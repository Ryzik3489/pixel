<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL OS | Ultimate Edition</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #000; --panel: #16181c; --accent: #1d9bf0; --text: #e7e9ea; --gray: #71767b; --border: #2f3336; --danger: #f4212e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        /* Окно входа */
        #auth-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .auth-card { background: #000; border: 1px solid var(--border); padding: 40px; border-radius: 20px; text-align: center; width: 350px; }
        .google-btn { background: #fff; color: #000; padding: 12px; border-radius: 25px; font-weight: bold; cursor: pointer; border: none; width: 100%; margin-top: 20px; }

        /* Sidebar */
        .sidebar { width: 270px; padding: 10px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { display: flex; align-items: center; gap: 20px; padding: 12px; border-radius: 30px; cursor: pointer; font-size: 19px; transition: 0.2s; color: var(--text); }
        .nav-item:hover { background: #181818; }
        .nav-item.active { font-weight: 900; }
        
        /* Лента */
        .main { width: 600px; border-right: 1px solid var(--border); overflow-y: auto; scrollbar-width: none; }
        .header { position: sticky; top: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid var(--border); font-size: 20px; font-weight: bold; z-index: 100; }
        
        .editor { padding: 15px; border-bottom: 1px solid var(--border); }
        .editor textarea { width: 100%; background: none; border: none; color: white; font-size: 19px; outline: none; resize: none; min-height: 80px; }
        .post-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; float: right; }

        .post { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #333; flex-shrink: 0; }
        .post-body { flex-grow: 1; }
        .post-info { display: flex; gap: 5px; color: var(--gray); font-size: 14px; margin-bottom: 5px; }
        .post-content { font-size: 15px; line-height: 1.4; margin-bottom: 10px; }
        .hashtag { color: var(--accent); cursor: pointer; }
        .actions { display: flex; justify-content: space-between; max-width: 400px; color: var(--gray); font-size: 14px; }
        .act-btn { cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .act-btn:hover { color: var(--accent); }
        .liked { color: #f91880 !important; }

        .hidden { display: none !important; opacity: 0; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>PIXEL</h1>
            <p style="color:var(--gray); margin-top:10px;">Войдите, чтобы видеть ленту</p>
            <button class="google-btn" onclick="login()">Войти через Google</button>
        </div>
    </div>

    <aside class="sidebar">
        <div style="font-size: 30px; margin-bottom: 20px; padding-left: 10px;"><i class="bi bi-lightning-charge-fill"></i></div>
        <div class="nav-item active" onclick="tab('feed', this)"><i class="bi bi-house"></i> Лента</div>
        <div class="nav-item" onclick="tab('search', this)"><i class="bi bi-search"></i> Поиск</div>
        <div class="nav-item" onclick="tab('profile', this)"><i class="bi bi-person"></i> Профиль</div>
        
        <div class="nav-item" style="margin-top:auto; color:var(--danger);" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Выйти
        </div>
    </aside>

    <main class="main">
        <div class="header" id="header-title">Главная</div>

        <div id="tab-feed" class="section">
            <div class="editor">
                <textarea id="post-input" maxlength="280" placeholder="Что происходит?"></textarea>
                <div style="overflow: hidden;"><button class="post-btn" onclick="sendPost()">Пост</button></div>
            </div>
            <div id="feed-items"></div>
        </div>

        <div id="tab-search" class="section hidden" style="padding: 15px;">
            <input type="text" id="search-input" oninput="searchPosts()" placeholder="Поиск по хэштегам или тексту..." style="width:100%; background:#202327; border:none; padding:12px; border-radius:20px; color:white; outline:none; margin-bottom:20px;">
            <div id="search-results"></div>
        </div>

        <div id="tab-profile" class="section hidden">
            <div id="profile-header" style="padding:20px; border-bottom:1px solid var(--border); text-align:center;"></div>
            <div id="profile-posts"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null, allPosts = [];

        // 1. АВТОРИЗАЦИЯ
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => { if(confirm("Выйти из аккаунта?")) signOut(auth).then(() => location.reload()); };

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('auth-screen').classList.add('hidden');
                init();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        // 2. ИНИЦИАЛИЗАЦИЯ ДАННЫХ
        function init() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(allPosts, 'feed-items');
                render(allPosts.filter(p => p.uid === user.uid), 'profile-posts');
                updateProfileInfo();
            });
        }

        // 3. ОТРИСОВКА ПОСТОВ
        function render(data, targetId) {
            const container = document.getElementById(targetId);
            container.innerHTML = "";
            data.forEach(p => {
                const isLiked = p.likes?.includes(user.uid);
                const linkedText = p.text.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');
                container.innerHTML += `
                    <div class="post">
                        <img src="${p.av}" class="avatar">
                        <div class="post-body">
                            <div class="post-info"><b>${p.author}</b> <span>@user</span></div>
                            <div class="post-content">${linkedText}</div>
                            <div class="actions">
                                <div class="act-btn ${isLiked?'liked':''}" onclick="like('${p.id}', ${JSON.stringify(p.likes)})">
                                    <i class="bi ${isLiked?'bi-heart-fill':'bi-heart'}"></i> ${p.likes?.length || 0}
                                </div>
                                <div class="act-btn"><i class="bi bi-bar-chart"></i> ${p.views || 0}</div>
                                <div class="act-btn"><i class="bi bi-share"></i></div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // 4. ФУНКЦИИ БАЗЫ ДАННЫХ
        window.sendPost = async () => {
            const txt = document.getElementById('post-input').value;
            if(!txt.trim()) return;
            await addDoc(collection(db, "posts"), {
                text: txt, author: user.displayName, av: user.photoURL, uid: user.uid,
                likes: [], views: 0, time: serverTimestamp()
            });
            document.getElementById('post-input').value = "";
        };

        window.like = async (id, likes) => {
            const ref = doc(db, "posts", id);
            await updateDoc(ref, { 
                likes: likes.includes(user.uid) ? arrayRemove(user.uid) : arrayUnion(user.uid),
                views: increment(1) // Добавляем просмотр при взаимодействии
            });
        };

        window.searchPosts = () => {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = allPosts.filter(p => p.text.toLowerCase().includes(q));
            render(filtered, 'search-results');
        };

        // 5. НАВИГАЦИЯ
        window.tab = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-'+id).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('header-title').innerText = id === 'feed' ? 'Главная' : (id === 'search' ? 'Поиск' : 'Профиль');
        };

        function updateProfileInfo() {
            document.getElementById('profile-header').innerHTML = `
                <img src="${user.photoURL}" style="width:80px; border-radius:50%; border:3px solid var(--border);">
                <h2>${user.displayName}</h2>
                <p style="color:var(--gray)">Вы вошли как администратор сети</p>
            `;
        }
    </script>
</body>
</html>

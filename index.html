<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL v2.0</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #0b0b0d; --panel: #1c1c1e; --accent: #007bff; --text: #ffffff; --gray: #8e8e93; --border: #2c2c2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 260px; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 30px; padding-left: 15px; }
        .nav-btn { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: var(--gray); transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }

        .main-content { flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .post { background: var(--panel); width: 100%; max-width: 600px; border-radius: 20px; padding: 20px; margin: 15px auto; border: 1px solid #222; }
        
        .editor { background: var(--panel); max-width: 600px; margin: 20px auto; border-radius: 25px; padding: 25px; }
        textarea { width: 100%; background: none; border: none; color: white; outline: none; resize: none; font-size: 18px; min-height: 40px; }
        
        .post-actions { display: flex; gap: 25px; margin-top: 15px; color: var(--gray); font-size: 14px; }
        .action { cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-pub { background: #d1d1d6; color: black; border: none; padding: 10px 28px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">ИТД <span>v1.1 beta</span></div>
        <div class="nav-btn active"><i class="bi bi-house-door-fill"></i> Лента</div>
        <div class="nav-btn"><i class="bi bi-search"></i> Поиск</div>
        <div class="nav-btn"><i class="bi bi-person"></i> Профиль</div>
        <div class="nav-btn" style="margin-top:auto; color:#ff453a;" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Выйти</div>
    </aside>

    <main class="main-content">
        <div class="editor">
            <textarea id="post-text" placeholder="Что нового?"></textarea>
            <div style="display:flex; justify-content:flex-end; margin-top:15px;">
                <button class="btn-pub" onclick="sendPost()">Опубликовать</button>
            </div>
        </div>
        <div id="feed-items"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        onAuthStateChanged(auth, (u) => { 
            if(u) { user = u; initApp(); } 
            else { signInWithPopup(auth, new GoogleAuthProvider()); } 
        });

        window.logout = () => signOut(auth).then(() => location.reload());

        function initApp() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                const container = document.getElementById('feed-items');
                container.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const isLiked = p.likes?.includes(user.uid);
                    const viewCount = p.viewers ? p.viewers.length : 0; // Считаем уникальных людей

                    container.innerHTML += `
                        <div class="post">
                            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                                <div style="display:flex; gap:10px; align-items:center;">
                                    <div style="width:35px; height:35px; border-radius:50%; background:url(${p.av}); background-size:cover;"></div>
                                    <b>${p.author}</b>
                                </div>
                                ${p.uid === user.uid ? `<i class="bi bi-trash action" style="color:#ff453a" onclick="deletePost('${d.id}')"></i>` : ''}
                            </div>
                            <div style="font-size:16px;">${p.text}</div>
                            <div class="post-actions">
                                <div class="action" onclick="like('${d.id}', ${JSON.stringify(p.likes)})">
                                    <i class="bi ${isLiked?'bi-heart-fill':'bi-heart'}" style="${isLiked?'color:#ff2d55':''}"></i> ${p.likes?.length || 0}
                                </div>
                                <div class="action"><i class="bi bi-graph-up"></i> ${viewCount}</div>
                            </div>
                        </div>`;
                    
                    // Умный просмотр: добавляем твой ID в список тех, кто видел пост
                    if (!p.viewers?.includes(user.uid)) {
                        updateDoc(doc(db, "posts", d.id), { viewers: arrayUnion(user.uid) });
                    }
                });
            });
        }

        window.sendPost = async () => {
            const t = document.getElementById('post-text').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), { 
                text: t, author: user.displayName, av: user.photoURL, uid: user.uid, 
                likes: [], viewers: [user.uid], time: serverTimestamp() 
            });
            document.getElementById('post-text').value = "";
        };

        window.deletePost = async (id) => { if(confirm("Удалить?")) await deleteDoc(doc(db, "posts", id)); };
        window.like = async (id, likes) => {
            const r = doc(db, "posts", id);
            await updateDoc(r, { likes: likes.includes(user.uid) ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };
    </script>
</body>
</html>

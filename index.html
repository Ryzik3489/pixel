<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL // MONOCHROME SOCIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        .brutalist-border { border: 2px solid #000000; }
        .brutalist-shadow { box-shadow: 4px 4px 0px 0px #000000; }
        
        .btn-pixel {
            @apply brutalist-border px-4 py-2 font-bold uppercase transition-colors duration-200;
            background: #ffffff;
            color: #000000;
        }

        .btn-pixel:hover {
            background: #000000;
            color: #ffffff;
        }

        .input-pixel {
            @apply brutalist-border p-2 outline-none w-full;
            border-radius: 0 !important;
        }

        .captcha-canvas {
            background: #eee;
            border: 2px solid #000;
            letter-spacing: 5px;
            font-style: italic;
        }

        #app { min-height: 100vh; }
        
        .hidden { display: none; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body>

    <div id="app">
        <section id="auth-screen" class="flex items-center justify-center min-h-screen p-4">
            <div class="max-w-md w-full p-8 brutalist-border brutalist-shadow">
                <h1 class="text-6xl font-black mb-8 italic">PIXEL</h1>
                
                <div id="auth-forms">
                    <div class="mb-4">
                        <label class="block font-bold mb-1">EMAIL</label>
                        <input type="email" id="auth-email" class="input-pixel" placeholder="user@pixel.com">
                    </div>
                    <div class="mb-6">
                        <label class="block font-bold mb-1">PASSWORD</label>
                        <input type="password" id="auth-pass" class="input-pixel" placeholder="••••••••">
                    </div>

                    <div class="mb-6">
                        <label class="block font-bold mb-1">VERIFY YOU ARE HUMAN</label>
                        <canvas id="captcha-canvas" width="200" height="50" class="captcha-canvas mb-2 w-full"></canvas>
                        <input type="text" id="captcha-input" class="input-pixel" placeholder="Enter characters above">
                    </div>

                    <div class="flex flex-col gap-3">
                        <button onclick="handleAuth('login')" class="btn-pixel w-full py-4 text-xl">LOGIN</button>
                        <button onclick="handleAuth('signup')" class="btn-pixel w-full">CREATE ACCOUNT</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="main-screen" class="hidden">
            <header class="sticky top-0 bg-white border-b-4 border-black z-40 p-4">
                <div class="max-w-4xl mx-auto flex justify-between items-center">
                    <h1 class="text-3xl font-black italic">PIXEL</h1>
                    <div class="flex gap-4">
                        <button onclick="toggleModal('post-modal')" class="btn-pixel flex items-center gap-2">
                            <i data-lucide="plus-square"></i> <span class="hidden md:inline">NEW POST</span>
                        </button>
                        <button onclick="handleSignOut()" class="btn-pixel">
                            <i data-lucide="log-out"></i>
                        </button>
                    </div>
                </div>
            </header>

            <div class="max-w-4xl mx-auto flex flex-col md:flex-row gap-8 p-4 mb-20">
                <aside class="hidden md:block w-1/4 sticky top-24 h-fit">
                    <div class="brutalist-border p-4 mb-4">
                        <p class="font-bold uppercase mb-2">My Profile</p>
                        <p id="user-display-email" class="text-sm break-all mb-4"></p>
                        <div class="flex justify-between border-t border-black pt-2">
                            <span>FOLLOWERS</span>
                            <span id="follower-count" class="font-bold">0</span>
                        </div>
                    </div>
                </aside>

                <main class="w-full md:w-3/4 space-y-8" id="feed-container">
                    </main>
            </div>

            <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t-4 border-black p-4 flex justify-around z-40">
                <button onclick="window.scrollTo(0,0)"><i data-lucide="home"></i></button>
                <button onclick="toggleModal('post-modal')"><i data-lucide="plus-square"></i></button>
                <button onclick="handleSignOut()"><i data-lucide="user"></i></button>
            </nav>
        </section>

        <div id="post-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
            <div class="bg-white brutalist-border p-6 w-full max-w-lg">
                <div class="flex justify-between mb-6">
                    <h2 class="text-2xl font-black">NEW PIXEL</h2>
                    <button onclick="toggleModal('post-modal')"><i data-lucide="x"></i></button>
                </div>
                <div class="space-y-4">
                    <input type="text" id="post-img-url" class="input-pixel" placeholder="IMAGE URL">
                    <textarea id="post-text" class="input-pixel h-32" placeholder="WHAT'S ON YOUR MIND?"></textarea>
                    <input type="text" id="post-tags" class="input-pixel" placeholder="TAGS (comma separated)">
                    <button onclick="createNewPost()" class="btn-pixel w-full py-4 text-xl">PUBLISH</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, increment, arrayUnion, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f",
            measurementId: "G-E35TB02ENB"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- STATE MANAGEMENT ---
        let currentUser = null;
        let captchaText = "";

        // --- CAPTCHA LOGIC ---
        function generateCaptcha() {
            const canvas = document.getElementById('captcha-canvas');
            const ctx = canvas.getContext('2d');
            captchaText = Math.random().toString(36).substring(2, 8).toUpperCase();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#000";
            ctx.font = "bold 24px monospace";
            ctx.fillText(captchaText, 40, 35);
            // Add noise lines
            for(let i=0; i<5; i++) {
                ctx.moveTo(Math.random()*200, Math.random()*50);
                ctx.lineTo(Math.random()*200, Math.random()*50);
                ctx.stroke();
            }
        }

        // --- AUTH LOGIC ---
        window.handleAuth = async (type) => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const captchaInput = document.getElementById('captcha-input').value;

            if (captchaInput !== captchaText) {
                alert("Incorrect Captcha!");
                generateCaptcha();
                return;
            }

            try {
                if (type === 'signup') {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) {
                alert(err.message);
            }
        };

        window.handleSignOut = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('user-display-email').innerText = user.email;
                initFeed();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-screen').classList.add('hidden');
                generateCaptcha();
            }
        });

        // --- FIRESTORE LOGIC ---
        window.createNewPost = async () => {
            const img = document.getElementById('post-img-url').value;
            const text = document.getElementById('post-text').value;
            const tags = document.getElementById('post-tags').value.split(',').map(t => t.trim());

            if (!img || !text) return alert("Fill required fields");

            await addDoc(collection(db, "posts"), {
                author: currentUser.email,
                uid: currentUser.uid,
                image: img,
                content: text,
                tags: tags,
                likes: 0,
                dislikes: 0,
                views: 0,
                comments: [],
                timestamp: Date.now()
            });

            toggleModal('post-modal');
            document.getElementById('post-img-url').value = "";
            document.getElementById('post-text').value = "";
        };

        function initFeed() {
            const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('feed-container');
                container.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    renderPost(docSnap.id, docSnap.data());
                    // Increment view
                    updateDoc(doc(db, "posts", docSnap.id), { views: increment(1) });
                });
                lucide.createIcons();
            });
        }

        window.handleEngagement = async (id, type) => {
            const ref = doc(db, "posts", id);
            await updateDoc(ref, { [type]: increment(1) });
        };

        window.addComment = async (id) => {
            const input = document.getElementById(`cmt-in-${id}`);
            if (!input.value) return;
            const ref = doc(db, "posts", id);
            await updateDoc(ref, {
                comments: arrayUnion({
                    user: currentUser.email,
                    text: input.value,
                    time: Date.now()
                })
            });
            input.value = "";
        };

        window.followUser = async (targetUid) => {
            if (targetUid === currentUser.uid) return alert("Can't follow yourself");
            const followRef = doc(db, "follows", `${currentUser.uid}_${targetUid}`);
            await setDoc(followRef, { follower: currentUser.uid, following: targetUid });
            alert("Following!");
        };

        // --- UI HELPERS ---
        window.toggleModal = (id) => {
            document.getElementById(id).classList.toggle('hidden');
        };

        window.toggleComments = (id) => {
            document.getElementById(`cmt-sec-${id}`).classList.toggle('hidden');
        };

        function renderPost(id, data) {
            const container = document.getElementById('feed-container');
            const date = new Date(data.timestamp).toLocaleDateString();
            
            const postHtml = `
                <article class="brutalist-border overflow-hidden">
                    <div class="p-4 border-b-2 border-black flex justify-between items-center">
                        <span class="font-bold uppercase text-sm">${data.author}</span>
                        <button onclick="followUser('${data.uid}')" class="text-xs btn-pixel py-1">FOLLOW</button>
                    </div>
                    <img src="${data.image}" alt="post" class="w-full grayscale hover:grayscale-0 transition-all duration-500 border-b-2 border-black object-cover max-h-96">
                    <div class="p-4">
                        <div class="flex gap-2 mb-2">
                            ${data.tags.map(t => `<span class="text-xs font-black">#${t.toUpperCase()}</span>`).join(' ')}
                        </div>
                        <p class="mb-4">${data.content}</p>
                        <div class="flex justify-between items-center text-xs font-bold mb-4">
                            <span>${date}</span>
                            <span>${data.views} VIEWS</span>
                        </div>
                        
                        <div class="flex border-t-2 border-black pt-4 gap-4">
                            <button onclick="handleEngagement('${id}', 'likes')" class="flex items-center gap-1 hover:underline">
                                <i data-lucide="thumbs-up" class="w-4"></i> ${data.likes}
                            </button>
                            <button onclick="handleEngagement('${id}', 'dislikes')" class="flex items-center gap-1 hover:underline">
                                <i data-lucide="thumbs-down" class="w-4"></i> ${data.dislikes}
                            </button>
                            <button onclick="toggleComments('${id}')" class="flex items-center gap-1 hover:underline">
                                <i data-lucide="message-square" class="w-4"></i> ${data.comments.length}
                            </button>
                        </div>
                    </div>

                    <div id="cmt-sec-${id}" class="hidden bg-gray-50 border-t-2 border-black p-4">
                        <div class="space-y-3 mb-4 max-h-40 overflow-y-auto">
                            ${data.comments.map(c => `
                                <div class="text-sm">
                                    <span class="font-bold">${c.user.split('@')[0]}:</span> ${c.text}
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="cmt-in-${id}" class="input-pixel text-sm" placeholder="Add comment...">
                            <button onclick="addComment('${id}')" class="btn-pixel text-xs">SEND</button>
                        </div>
                    </div>
                </article>
            `;
            container.innerHTML += postHtml;
        }

        // Init
        generateCaptcha();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Ultra Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

    <div id="side-menu">
        <div class="user-cover">
            <span id="my-emoji">👤</span>
            <strong id="my-name">Загрузка...</strong><br>
            <small id="my-phone">...</small>
        </div>
        <div class="menu-content">
            <div class="menu-item" id="btn-create-group">👥 Создать группу</div>
            <div class="menu-item" id="btn-create-channel">📢 Создать канал</div>
            <div class="menu-item" id="btn-profile-settings">⚙️ Настройки профиля</div>
            <div class="menu-item" id="btn-toggle-theme">🌓 Сменить тему</div>
        </div>
    </div>
    <div class="overlay"></div>

    <div id="app">
        <div id="auth-screen">
            <h1>Pixel</h1>
            <div id="recaptcha-container"></div>
            <input type="tel" id="phone" placeholder="+7 700 000 0000">
            <button id="btn-send-otp">Войти</button>
            <div id="otp-box" style="display:none">
                <input type="text" id="otp-code" placeholder="Код из SMS">
                <button id="btn-verify-otp">Подтвердить</button>
            </div>
        </div>

        <div id="main-screen" style="display:none">
            <div class="sidebar-chats">
                <header>
                    <div class="menu-trigger">☰</div>
                    <input type="text" id="search-input" placeholder="Поиск @юзера или чата...">
                </header>
                <div class="tabs">
                    <div class="tab active" data-type="all">Все</div>
                    <div class="tab" data-type="group">Группы</div>
                    <div class="tab" data-type="channel">Каналы</div>
                </div>
                <div id="chat-list"></div>
            </div>

            <div class="chat-view">
                <div id="chat-header">
                    <h3 id="active-title">Выберите чат</h3>
                    <button id="btn-add-member" style="display:none">+ Добавить</button>
                </div>
                <div id="messages-area"></div>
                <div id="input-area" style="display:none">
                    <input type="text" id="message-input" placeholder="Сообщение...">
                    <button id="btn-send">🚀</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel — User Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0e1621; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .sidebar { background: #17212b; width: 320px; border-right: 1px solid #080d14; }
        .tg-input { background: #17212b; border: 1px solid #242f3d; padding: 12px; border-radius: 10px; width: 100%; outline: none; color: white; }
        .btn-blue { background: #3390ec; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; cursor: pointer; border: none; color: white; }
        .message-in { background: #182533; border-radius: 12px; padding: 8px 12px; max-width: 80%; align-self: flex-start; margin-bottom: 8px; }
        .message-out { background: #2b5278; border-radius: 12px; padding: 8px 12px; max-width: 80%; align-self: flex-end; margin-bottom: 8px; }
        .online-dot { width: 10px; height: 10px; background: #00ff00; border-radius: 50%; border: 2px solid #17212b; position: absolute; bottom: 0; right: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BOT_TOKEN = "8780477035:AAH4_DeKaAfyRGScU7eSPpRjBpmJlv5ORTU";

        const App = () => {
            const [view, setView] = useState('auth'); 
            const [activeChatId, setActiveChatId] = useState(0);
            const [myCode, setMyCode] = useState(null);
            const [inputCode, setInputCode] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            // Данные чатов (Люди, Группы, Каналы)
            const [chats] = useState([
                { id: 0, name: "Избранное", status: "облако", type: "saved", msg: "Заметки и файлы" },
                { id: 1, name: "Артем", status: "в сети", type: "user", msg: "Где исходники?" },
                { id: 2, name: "Разработка Pixel", status: "45 участников", type: "group", msg: "Илья: Код готов" },
                { id: 3, name: "Канал: Новости", status: "10к подписчиков", type: "channel", msg: "Обновление 2.0" }
            ]);

            // Функция: найти юзера и отправить код
            const getCodeFromBot = async () => {
                setIsLoading(true);
                try {
                    // 1. Узнаем Chat ID того, кто последним писал боту
                    const updates = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`).then(r => r.json());
                    if (!updates.result.length) throw new Error("Сначала напиши боту!");
                    
                    const chatId = updates.result[updates.result.length - 1].message.chat.id;
                    const code = Math.floor(1000 + Math.random() * 9000).toString();
                    setMyCode(code);

                    // 2. Шлем код этому юзеру
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${chatId}&text=🔐 Твой код Pixel: ${code}`);
                    setView('verify');
                } catch (e) {
                    alert("Ошибка: Напиши боту любое сообщение в Telegram и попробуй снова!");
                }
                setIsLoading(false);
            };

            const confirmCode = () => {
                if (inputCode === myCode) setView('main');
                else alert("Неверный код!");
            };

            // ЭКРАН ВХОДА
            if (view === 'auth') return (
                <div className="flex flex-col items-center justify-center h-screen max-w-xs mx-auto text-center">
                    <h1 className="text-3xl font-bold mb-8">Pixel</h1>
                    <button onClick={getCodeFromBot} className="btn-blue uppercase">
                        {isLoading ? "Ищем тебя в Telegram..." : "Войти через бота"}
                    </button>
                    <p className="mt-4 text-xs text-gray-500">Бот пришлет код тебе в личку</p>
                </div>
            );

            // ЭКРАН ПРОВЕРКИ
            if (view === 'verify') return (
                <div className="flex flex-col items-center justify-center h-screen max-w-xs mx-auto text-center">
                    <h1 className="text-2xl font-bold mb-6">Введите код</h1>
                    <input className="tg-input text-center text-2xl tracking-widest mb-6" maxLength="4" value={inputCode} onChange={e => setInputCode(e.target.value)} />
                    <button onClick={confirmCode} className="btn-blue uppercase">Подтвердить</button>
                </div>
            );

            // ГЛАВНЫЙ ЭКРАН
            return (
                <div className="flex h-screen w-full">
                    {/* Sidebar */}
                    <div className="sidebar flex flex-col">
                        <div className="p-4 border-b border-gray-800 flex items-center justify-between">
                            <span className="font-bold">Pixel Messenger</span>
                            <i className="fa-solid fa-gear text-gray-500 cursor-pointer" onClick={() => alert('Настройки: Имя: Илья, Юзер: @ilya_dev')}></i>
                        </div>
                        <div className="flex-1 overflow-y-auto">
                            {chats.map(chat => (
                                <div key={chat.id} onClick={() => setActiveChatId(chat.id)} className={`p-4 flex items-center cursor-pointer ${activeChatId === chat.id ? 'bg-[#2b5278]' : 'hover:bg-[#232e3a]'}`}>
                                    <div className="relative">
                                        <div className="w-12 h-12 rounded-full bg-blue-600 mr-3 flex items-center justify-center font-bold">{chat.name[0]}</div>
                                        {chat.status === "в сети" && <div className="online-dot"></div>}
                                    </div>
                                    <div className="flex-1 overflow-hidden">
                                        <div className="flex justify-between font-bold text-sm"><span>{chat.name}</span><span className="text-xs text-gray-500">12:10</span></div>
                                        <div className="text-xs text-gray-400 truncate">{chat.msg}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Chat Window */}
                    <div className="flex-1 flex flex-col bg-[#0e1621]">
                        <div className="h-14 bg-[#17212b] flex items-center justify-between px-6 shadow-md border-l border-black/20">
                            <div>
                                <div className="font-bold text-sm">{chats[activeChatId].name}</div>
                                <div className="text-[10px] text-blue-400 uppercase">{chats[activeChatId].status}</div>
                            </div>
                            <div className="flex space-x-6 text-gray-400"><i className="fa-solid fa-magnifying-glass"></i><i className="fa-solid fa-ellipsis-vertical"></i></div>
                        </div>

                        <div className="flex-1 p-6 flex flex-col overflow-y-auto overflow-x-hidden">
                            <div className="message-in text-sm">Добро пожаловать в {chats[activeChatId].name}!</div>
                            <div className="message-out text-sm">Теперь я могу писать другим и видеть их статус.</div>
                        </div>

                        {/* Input */}
                        <div className="p-4 bg-[#17212b] flex items-center space-x-4">
                            <label className="cursor-pointer text-gray-400 hover:text-white">
                                <i className="fa-solid fa-camera text-xl"></i>
                                <input type="file" className="hidden" />
                            </label>
                            <input className="bg-transparent flex-1 outline-none text-sm" placeholder="Написать сообщение..." />
                            <button className="text-blue-400 font-bold uppercase text-xs">Отправить</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

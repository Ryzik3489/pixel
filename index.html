<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL v1.5 Ultra</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #0b0b0d; --panel: #1c1c1e; --accent: #007bff; --text: #ffffff; --gray: #8e8e93; --border: #2c2c2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 260px; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 30px; padding-left: 15px; letter-spacing: 2px; }
        .nav-btn { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: var(--gray); transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }
        
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none; }
        .post { background: var(--panel); width: 100%; max-width: 600px; border-radius: 20px; padding: 20px; margin: 15px auto; border: 1px solid #222; }

        /* Опросы */
        .poll-box { margin-top: 15px; background: #111; border-radius: 12px; padding: 15px; border: 1px solid #333; }
        .poll-opt { 
            position: relative; background: #222; margin-bottom: 8px; border-radius: 8px; 
            height: 40px; display: flex; align-items: center; padding: 0 12px; cursor: pointer; overflow: hidden; 
        }
        .poll-bar { position: absolute; left: 0; top: 0; height: 100%; background: rgba(0, 123, 255, 0.3); transition: 0.5s; z-index: 1; }
        .poll-txt { position: relative; z-index: 2; width: 100%; display: flex; justify-content: space-between; font-size: 14px; }

        .editor { background: var(--panel); max-width: 600px; margin: 20px auto; border-radius: 20px; padding: 20px; }
        textarea { width: 100%; background: none; border: none; color: white; outline: none; resize: none; font-size: 16px; }
        .poll-edit-input { width: 100%; background: #0b0b0d; border: 1px solid #333; color: white; padding: 8px; border-radius: 8px; margin-top: 5px; font-size: 14px; }
        
        .btn-pub { background: white; color: black; border: none; padding: 8px 22px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">PIXEL</div>
        <div class="nav-btn active" onclick="nav('feed')"><i class="bi bi-house-door-fill"></i> Лента</div>
        <div class="nav-btn" onclick="nav('search')"><i class="bi bi-search"></i> Поиск</div>
        <div class="nav-btn" onclick="nav('profile')"><i class="bi bi-person"></i> Профиль</div>
        <div class="nav-btn" style="margin-top:auto; color:red" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Выйти</div>
    </aside>

    <main class="main-content">
        <div id="sec-feed" class="section active">
            <div class="editor">
                <textarea id="post-text" placeholder="Что нового?"></textarea>
                <div id="poll-creator" style="display:none; margin-top:10px; padding-top:10px; border-top:1px solid #333;">
                    <input type="text" id="poll-q" class="poll-edit-input" placeholder="Вопрос опроса">
                    <input type="text" id="poll-o1" class="poll-edit-input" placeholder="Вариант 1">
                    <input type="text" id="poll-o2" class="poll-edit-input" placeholder="Вариант 2">
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                    <div style="display:flex; gap:20px; color:var(--gray); font-size:20px;">
                        <i class="bi bi-bar-chart action" onclick="document.getElementById('poll-creator').style.display='block'"></i>
                        <i class="bi bi-emoji-smile"></i>
                    </div>
                    <button class="btn-pub" onclick="sendPost()">Опубликовать</button>
                </div>
            </div>
            <div id="feed-items"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        onAuthStateChanged(auth, (u) => {
            if(u) { user = u; init(); } else { signInWithPopup(auth, new GoogleAuthProvider()); }
        });

        window.logout = () => signOut(auth).then(() => location.reload());

        window.sendPost = async () => {
            const t = document.getElementById('post-text').value;
            const q = document.getElementById('poll-q').value;
            if(!t.trim()) return;
            
            await addDoc(collection(db, "posts"), {
                text: t, author: user.displayName, av: user.photoURL, uid: user.uid,
                poll: q ? { q, o1: document.getElementById('poll-o1').value, o2: document.getElementById('poll-o2').value, v1: 0, v2: 0, voters: [] } : null,
                likes: [], views: 0, time: serverTimestamp()
            });
            location.reload(); 
        };

        function init() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                const f = document.getElementById('feed-items'); f.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const total = (p.poll?.v1 || 0) + (p.poll?.v2 || 0);
                    const pc1 = total ? Math.round((p.poll.v1 / total) * 100) : 0;
                    const pc2 = total ? Math.round((p.poll.v2 / total) * 100) : 0;

                    f.innerHTML += `
                        <div class="post">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
                                <div style="display:flex; gap:10px; align-items:center">
                                    <div style="width:35px; height:35px; border-radius:50%; background:url(${p.av}); background-size:cover"></div>
                                    <b>${p.author}</b>
                                </div>
                                <i class="bi bi-exclamation-triangle" style="color:red; cursor:pointer" title="Пожаловаться" onclick="report('${d.id}', '${p.author}')"></i>
                            </div>
                            <div>${p.text}</div>
                            
                            ${p.poll ? `
                                <div class="poll-box">
                                    <b style="display:block; margin-bottom:10px">${p.poll.q}</b>
                                    <div class="poll-opt" onclick="vote('${d.id}', 1)">
                                        <div class="poll-bar" style="width:${pc1}%"></div>
                                        <div class="poll-txt"><span>${p.poll.o1}</span> <span>${pc1}%</span></div>
                                    </div>
                                    <div class="poll-opt" onclick="vote('${d.id}', 2)">
                                        <div class="poll-bar" style="width:${pc2}%"></div>
                                        <div class="poll-txt"><span>${p.poll.o2}</span> <span>${pc2}%</span></div>
                                    </div>
                                    <small style="color:gray">${total} голосов</small>
                                </div>` : ''}

                            <div style="display:flex; gap:20px; margin-top:15px; color:gray">
                                <span onclick="like('${d.id}', ${JSON.stringify(p.likes)})"><i class="bi bi-heart"></i> ${p.likes?.length || 0}</span>
                                <span><i class="bi bi-graph-up"></i> ${p.views || 0}</span>
                            </div>
                        </div>`;
                    updateDoc(doc(db, "posts", d.id), { views: increment(1) });
                });
            });
        }

        window.vote = async (id, opt) => {
            const ref = doc(db, "posts", id);
            await updateDoc(ref, { 
                [`poll.v${opt}`]: increment(1),
                "poll.voters": arrayUnion(user.uid) 
            });
        };

        window.report = (id, author) => {
            const mail = "ryzik3489@gmail.com";
            const subject = "REPORT PIXEL: " + author;
            const body = `Жалоба на пост ID: ${id}. Нарушитель: ${author}. Текст жалобы: ...`;
            window.location.href = `mailto:${mail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            alert("Черновик репорта создан! Отправьте его из почты.");
        };

        window.like = async (id, likes) => {
            const r = doc(db, "posts", id);
            await updateDoc(r, { likes: likes.includes(user.uid) ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Cloud OS 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.fb = { doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp, orderBy };
    </script>

    <style>
        body { background: #0e1621; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(23, 33, 43, 0.9); backdrop-filter: blur(15px); }
        .sidebar { width: 320px; border-right: 1px solid rgba(255,255,255,0.05); }
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 12px; position: relative; margin-bottom: 4px; cursor: pointer; }
        .msg-out { background: #2b5278; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-in { background: #182533; align-self: flex-start; border-bottom-left-radius: 2px; }
        .spoiler { background: #444; color: transparent; cursor: help; border-radius: 3px; filter: blur(3px); }
        .spoiler.open { color: inherit; background: transparent; filter: none; }
        .reaction-panel { display: none; position: absolute; top: -35px; background: #1c242f; border-radius: 20px; padding: 4px 10px; border: 1px solid #3390ec; z-index: 50; }
        .msg:hover .reaction-panel { display: flex; gap: 8px; }
        .acc-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // МУЛЬТИАККАУНТЫ
            const [accounts, setAccounts] = useState(JSON.parse(localStorage.getItem('pixel_accounts')) || []);
            const [activeAccIndex, setActiveAccIndex] = useState(0);
            const currentUser = accounts[activeAccIndex];

            const [chats, setChats] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [search, setSearch] = useState('');
            const scrollRef = useRef();

            useEffect(() => {
                localStorage.setItem('pixel_accounts', JSON.stringify(accounts));
            }, [accounts]);

            // 1. СЛУШАЕМ ПОЯВЛЕНИЕ ЧАТОВ (Механика «Появления»)
            useEffect(() => {
                if (!currentUser) return;
                const q = window.fb.query(
                    window.fb.collection(window.db, "conversations"),
                    window.fb.where("participants", "array-contains", currentUser.username)
                );

                const unsub = window.fb.onSnapshot(q, (snap) => {
                    const list = [];
                    snap.forEach(doc => {
                        const data = doc.data();
                        const other = data.participants.find(p => p !== currentUser.username);
                        list.push({ id: doc.id, other, ...data });
                    });
                    setChats(list.sort((a, b) => (b.lastUpdate?.seconds || 0) - (a.lastUpdate?.seconds || 0)));
                });
                return () => unsub();
            }, [currentUser]);

            // 2. СЛУШАЕМ СООБЩЕНИЯ
            useEffect(() => {
                if (!activeChat || !currentUser) return;
                const q = window.fb.query(
                    window.fb.collection(window.db, "conversations", activeChat.id, "messages"),
                    window.fb.orderBy("timestamp", "asc")
                );
                return window.fb.onSnapshot(q, (snap) => {
                    const m = [];
                    snap.forEach(d => m.push({ id: d.id, ...d.data() }));
                    setMessages(m);
                    setTimeout(() => scrollRef.current?.scrollIntoView({ behavior: 'smooth' }), 50);
                });
            }, [activeChat]);

            const addAccount = () => {
                if (accounts.length >= 3) return alert("Лимит — 3 аккаунта");
                const name = prompt("Имя:");
                const username = prompt("@username:").replace('@', '').toLowerCase();
                if (name && username) setAccounts([...accounts, { name, username }]);
            };

            const sendMessage = async (type = 'text') => {
                if (!input.trim() || !activeChat) return;
                const text = input;
                setInput('');

                const chatRef = window.fb.doc(window.db, "conversations", activeChat.id);
                await window.fb.addDoc(window.fb.collection(chatRef, "messages"), {
                    text,
                    sender: currentUser.username,
                    timestamp: window.fb.serverTimestamp(),
                    isSpoiler: text.startsWith('!'), // Если начать с !, будет спойлер
                    reaction: null
                });

                await window.fb.updateDoc(chatRef, {
                    lastMsg: text,
                    lastUpdate: window.fb.serverTimestamp()
                });
            };

            const deleteForAll = async (msgId) => {
                if(confirm("Удалить для всех?")) {
                    await window.fb.deleteDoc(window.fb.doc(window.db, "conversations", activeChat.id, "messages", msgId));
                }
            };

            const setReaction = async (msgId, emoji) => {
                await window.fb.updateDoc(window.fb.doc(window.db, "conversations", activeChat.id, "messages", msgId), {
                    reaction: emoji
                });
            };

            if (!currentUser) return (
                <div className="h-screen flex flex-col items-center justify-center">
                    <h1 className="text-4xl font-bold text-blue-500 mb-8">Pixel Messenger</h1>
                    <button onClick={addAccount} className="bg-blue-600 px-10 py-4 rounded-2xl font-bold">ДОБАВИТЬ АККАУНТ</button>
                </div>
            );

            return (
                <div className="flex h-screen w-full">
                    {/* Sidebar */}
                    <div className="sidebar glass flex flex-col">
                        <div className="p-4 flex items-center justify-between border-b border-white/5">
                            <div className="flex gap-2">
                                {accounts.map((acc, i) => (
                                    <div 
                                        key={i} 
                                        onClick={() => {setActiveAccIndex(i); setActiveChat(null);}}
                                        className={`w-8 h-8 rounded-lg cursor-pointer flex items-center justify-center text-xs font-bold ${activeAccIndex === i ? 'bg-blue-600' : 'bg-gray-700'}`}
                                        title={acc.username}
                                    >
                                        {acc.name[0]}
                                    </div>
                                ))}
                                {accounts.length < 3 && <div onClick={addAccount} className="w-8 h-8 rounded-lg bg-gray-800 flex items-center justify-center cursor-pointer hover:bg-gray-600">+</div>}
                            </div>
                            <span className="text-[10px] text-gray-500 uppercase">@{currentUser.username}</span>
                        </div>

                        <div className="p-4">
                            <input 
                                className="w-full bg-[#242f3d] p-2 rounded-xl text-sm outline-none" 
                                placeholder="Глобальный поиск..." 
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && (async () => {
                                    const target = search.replace('@','').toLowerCase();
                                    const pairId = [currentUser.username, target].sort().join('_');
                                    await window.fb.setDoc(window.fb.doc(window.db, "conversations", pairId), {
                                        participants: [currentUser.username, target],
                                        lastMsg: "Новый чат",
                                        lastUpdate: window.fb.serverTimestamp()
                                    }, {merge: true});
                                    setActiveChat({id: pairId, other: target});
                                    setSearch('');
                                })()}
                            />
                        </div>

                        <div className="flex-1 overflow-y-auto">
                            {chats.map(chat => (
                                <div key={chat.id} onClick={() => setActiveChat(chat)} className={`p-4 flex items-center cursor-pointer hover:bg-white/5 ${activeChat?.id === chat.id ? 'bg-[#2b5278]' : ''}`}>
                                    <div className="w-12 h-12 rounded-full bg-blue-900 mr-3 flex items-center justify-center font-bold">{chat.other[0].toUpperCase()}</div>
                                    <div className="flex-1 overflow-hidden">
                                        <div className="flex justify-between text-sm font-bold">
                                            <span>{chat.other}</span>
                                            <span className="text-[10px] text-gray-500 font-normal">Мгн.</span>
                                        </div>
                                        <div className="text-xs text-gray-400 truncate">{chat.lastMsg}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 flex flex-col">
                        {activeChat ? (
                            <>
                                <div className="h-16 bg-[#17212b] flex items-center px-6 justify-between border-b border-black">
                                    <div className="font-bold">@{activeChat.other}</div>
                                    <div className="text-xs text-blue-400">онлайн</div>
                                </div>

                                <div className="flex-1 overflow-y-auto p-6 flex flex-col space-y-2">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`msg ${m.sender === currentUser.username ? 'msg-out' : 'msg-in'} group`}>
                                            <div className="reaction-panel">
                                                <span onClick={() => setReaction(m.id, '🔥')}>🔥</span>
                                                <span onClick={() => setReaction(m.id, '👍')}>👍</span>
                                                <span onClick={() => setReaction(m.id, '❤️')}>❤️</span>
                                                {m.sender === currentUser.username && <span onClick={() => deleteForAll(m.id)} className="text-red-500 ml-2">🗑</span>}
                                            </div>
                                            <div 
                                                className={m.isSpoiler ? "spoiler" : ""} 
                                                onClick={(e) => e.target.classList.toggle('open')}
                                            >
                                                {m.text}
                                            </div>
                                            {m.reaction && <div className="absolute -bottom-2 right-1 bg-[#1c242f] rounded-full px-1 text-[10px] border border-gray-700">{m.reaction}</div>}
                                            <div className="text-[9px] opacity-40 text-right mt-1">12:26 ✓✓</div>
                                        </div>
                                    ))}
                                    <div ref={scrollRef} />
                                </div>

                                <div className="p-4 bg-[#17212b] flex gap-3">
                                    <input 
                                        className="flex-1 bg-transparent outline-none" 
                                        placeholder="Напишите сообщение (начни с ! для спойлера)..." 
                                        value={input}
                                        onChange={e => setInput(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && sendMessage()}
                                    />
                                    <button onClick={() => sendMessage()} className="text-blue-400 font-bold uppercase text-xs">Отправить</button>
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 flex items-center justify-center opacity-20 text-2xl font-light">Выберите аккаунт или найдите собеседника</div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Pro</title>
    <style>
        :root {
            --bg: #f0f2f5; --sidebar: #ffffff; --text: #1c1e21; --accent: #0084ff;
            --msg-me: #0084ff; --msg-other: #e4e6eb;
        }
        [data-theme="dark"] {
            --bg: #18191a; --sidebar: #242526; --text: #e4e6eb; --accent: #2e89ff;
            --msg-me: #2e89ff; --msg-other: #3a3b3c;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- Боковая панель (Sidebar) --- */
        #side-menu {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: var(--sidebar); z-index: 100; transition: 0.3s;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2); padding: 20px;
        }
        #side-menu.active { left: 0; }
        .menu-item { padding: 12px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .menu-item:hover { background: rgba(0,0,0,0.05); }

        /* --- Интерфейс --- */
        header { background: var(--sidebar); padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .menu-btn { font-size: 24px; cursor: pointer; }

        #main-screen { display: none; height: 100vh; flex-direction: column; }
        #chat-window { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        .msg { max-width: 70%; padding: 10px; border-radius: 12px; margin: 5px 0; position: relative; }
        .msg.me { align-self: flex-end; background: var(--msg-me); color: white; }
        .msg.other { align-self: flex-start; background: var(--msg-other); }
        
        /* Цвета имен */
        .sender-name { font-size: 11px; font-weight: bold; margin-bottom: 3px; }

        #input-bar { padding: 15px; background: var(--sidebar); display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; background: var(--bg); color: var(--text); }
        
        /* Стили профиля */
        .profile-setup { display: none; padding: 20px; background: var(--sidebar); border-radius: 15px; margin: 20px; }
    </style>
</head>
<body>

<div id="side-menu">
    <h3 id="user-display-name">Загрузка...</h3>
    <p id="user-phone" style="font-size: 12px; opacity: 0.6;"></p>
    <hr>
    <div class="menu-item" onclick="openProfile()">👤 Мой профиль</div>
    <div class="menu-item" onclick="alert('В разработке...')">👥 Создать группу</div>
    <div class="menu-item" onclick="openSaved()">🔖 Избранное</div>
    <div class="menu-item" onclick="toggleTheme()">🌓 Ночной режим</div>
    <br>
    <button onclick="closeMenu()" style="width: 100%">Закрыть</button>
</div>

<div id="app">
    <div id="auth-screen" style="text-align: center; margin-top: 100px;">
        <h1>Pixel</h1>
        <div id="recaptcha-container"></div>
        <input type="tel" id="phone" placeholder="+7...">
        <button onclick="sendOTP()">Войти</button>
    </div>

    <div id="main-screen">
        <header>
            <div class="menu-btn" onclick="openMenu()">☰</div>
            <div id="chat-title">Pixel Global</div>
        </header>
        
        <div id="profile-area" class="profile-setup">
            <h4>Настройки профиля</h4>
            <input type="text" id="set-name" placeholder="Твое имя">
            <input type="text" id="set-bio" placeholder="О себе">
            <p>Цвет ника:</p>
            <input type="color" id="set-color" value="#0084ff">
            <button onclick="saveProfile()">Сохранить</button>
        </div>

        <div id="chat-window">
            <div id="messages"></div>
            <div id="input-bar">
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button onclick="sendMsg()">🚀</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPhoneNumber, RecaptchaVerifier } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
        authDomain: "pixel-7c9f0.firebaseapp.com",
        projectId: "pixel-7c9f0",
        storageBucket: "pixel-7c9f0.firebasestorage.app",
        messagingSenderId: "1016081455742",
        appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.openMenu = () => document.getElementById('side-menu').classList.add('active');
    window.closeMenu = () => document.getElementById('side-menu').classList.remove('active');

    // Авторизация
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {'size': 'invisible'});
    window.sendOTP = async () => {
        const phone = document.getElementById('phone').value;
        const confirmation = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
        const code = prompt("Введите код из SMS (или тестовый):");
        const result = await confirmation.confirm(code);
        initUser(result.user);
    };

    async function initUser(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'flex';
        
        // Загружаем данные профиля
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
            const data = userDoc.data();
            document.getElementById('user-display-name').innerText = data.name || "Пользователь";
        }
        document.getElementById('user-phone').innerText = user.phoneNumber;
        loadMessages();
    }

    // Кастомизация профиля
    window.openProfile = () => {
        const area = document.getElementById('profile-area');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    };

    window.saveProfile = async () => {
        const user = auth.currentUser;
        await setDoc(doc(db, "users", user.uid), {
            name: document.getElementById('set-name').value,
            bio: document.getElementById('set-bio').value,
            color: document.getElementById('set-color').value,
            phone: user.phoneNumber
        }, { merge: true });
        alert("Профиль обновлен!");
        location.reload();
    };

    // Чат
    window.sendMsg = async () => {
        const text = document.getElementById('msg-input').value;
        const user = auth.currentUser;
        const userDoc = await getDoc(doc(db, "users", user.uid));
        const userData = userDoc.data() || {};

        await addDoc(collection(db, "messages"), {
            text,
            uid: user.uid,
            name: userData.name || user.phoneNumber,
            color: userData.color || "#0084ff",
            timestamp: serverTimestamp()
        });
        document.getElementById('msg-input').value = "";
    };

    function loadMessages() {
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const container = document.getElementById('messages');
            container.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.uid === auth.currentUser.uid;
                container.innerHTML += `
                    <div class="msg ${isMe ? 'me' : 'other'}">
                        <div class="sender-name" style="color: ${isMe ? '#fff' : m.color}">${m.name}</div>
                        ${m.text}
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    window.toggleTheme = () => {
        document.body.getAttribute('data-theme') === 'dark' ? 
        document.body.removeAttribute('data-theme') : 
        document.body.setAttribute('data-theme', 'dark');
    };
</script>
</body>
</html>

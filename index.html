<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL PRO - Social</title>
    <style>
        :root {
            --bg-dark: #333333;
            --panel-gray: #8c8c8c;
            --button-gray: #6e6e6e;
            --accent: #00ffcc; /* Цвет для важных элементов */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); display: flex; justify-content: center; padding: 20px; color: white; height: 100vh; overflow: hidden; }
        
        .container { display: flex; width: 100%; max-width: 1300px; gap: 20px; height: 95vh; }

        /* Sidebar */
        .sidebar { background: var(--panel-gray); width: 300px; border-radius: 35px; padding: 25px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .logo-box { background: var(--button-gray); border-radius: 20px; padding: 25px; text-align: center; font-size: 28px; font-weight: 900; letter-spacing: 5px; color: white; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        
        .nav-btn { background: var(--button-gray); border: none; border-radius: 20px; padding: 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: black; transition: 0.2s; }
        .nav-btn:hover { background: #555; color: white; transform: translateX(5px); }
        
        /* Огромная кнопка инвента */
        .btn-inventory { background: #444; color: var(--accent); border: 2px solid var(--accent); padding: 20px; font-size: 18px; margin-top: auto; justify-content: center; gap: 10px; }
        .btn-inventory:hover { background: var(--accent); color: black; }

        /* Контент */
        .main-content { flex-grow: 1; background: var(--panel-gray); border-radius: 35px; padding: 25px; overflow-y: auto; color: black; display: flex; flex-direction: column; gap: 20px; }

        /* Создание поста */
        .create-post { background: #555; padding: 20px; border-radius: 25px; display: flex; flex-direction: column; gap: 10px; }
        .create-post textarea { width: 100%; padding: 12px; border-radius: 15px; border: none; background: #eee; resize: none; font-size: 14px; }
        .create-post input { width: 100%; padding: 10px; border-radius: 12px; border: none; background: #ddd; }
        .btn-publish { background: black; color: white; padding: 12px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; }

        /* Посты */
        .post { background: var(--button-gray); border-radius: 25px; padding: 20px; color: white; position: relative; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .post-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; font-size: 14px; color: #ccc; }
        .post-text { font-size: 16px; line-height: 1.5; margin-bottom: 10px; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 10px; object-fit: cover; max-height: 400px; }
        
        .post-footer { display: flex; gap: 15px; margin-top: 15px; align-items: center; }
        .like-btn { background: none; border: 1px solid #999; color: white; padding: 5px 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .like-btn.active { background: #ff4757; border-color: #ff4757; }
        .delete-btn { background: none; border: none; color: #ffbcbc; cursor: pointer; font-size: 12px; margin-left: auto; }

        /* Модалка */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--panel-gray); padding: 40px; border-radius: 40px; width: 350px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo-box">PIXEL</div>
            
            <button id="login-btn" class="nav-btn" onclick="openModal()">ВХОД <span>👤</span></button>
            <div id="user-info" style="display:none; background: #444; padding: 15px; border-radius: 20px; text-align: center;">
                <div id="user-name" style="font-weight: bold; margin-bottom: 5px;"></div>
                <button onclick="logout()" style="color: #ff4757; background: none; border: none; cursor: pointer; font-size: 12px;">Выйти</button>
            </div>

            <button class="nav-btn" onclick="document.getElementById('feed').scrollIntoView()">ПОСТЫ <span>🏠</span></button>
            <button class="nav-btn">ПОИСК <span>🔍</span></button>
            
            <a href="https://world-pixel-ten.vercel.app/" class="nav-btn btn-inventory">ИНВЕНТАРЬ 📦</a>
        </aside>

        <main class="main-content">
            <div id="create-post-area" class="create-post" style="display: none;">
                <textarea id="post-text" placeholder="Что у тебя на уме?" rows="3"></textarea>
                <input type="text" id="post-img-url" placeholder="Ссылка на картинку (URL)">
                <button class="btn-publish" onclick="publishPost()">ОПУБЛИКОВАТЬ</button>
            </div>

            <div id="feed">Загрузка...</div>
        </main>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <h3 style="color:black; margin-bottom:20px;">ВХОД В PIXEL</h3>
            <button class="btn-publish" style="width:100%; margin-bottom:10px; background:#db4437" onclick="login('google')">Google</button>
            <button class="btn-publish" style="width:100%; background:#333" onclick="login('github')">GitHub</button>
            <p onclick="closeModal()" style="margin-top:20px; cursor:pointer; font-size:12px; color: #444;">Отмена</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, GithubAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // Вход / Выход
        window.openModal = () => document.getElementById('authModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('authModal').style.display = 'none';
        window.login = async (type) => {
            const provider = type === 'google' ? new GoogleAuthProvider() : new GithubAuthProvider();
            await signInWithPopup(auth, provider);
            closeModal();
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const loginBtn = document.getElementById('login-btn');
            const userInfo = document.getElementById('user-info');
            const createArea = document.getElementById('create-post-area');

            if (user) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'block';
                createArea.style.display = 'flex';
                document.getElementById('user-name').innerText = user.displayName;
            } else {
                loginBtn.style.display = 'flex';
                userInfo.style.display = 'none';
                createArea.style.display = 'none';
            }
            loadPosts();
        });

        // ПУБЛИКАЦИЯ ПОСТА
        window.publishPost = async () => {
            const text = document.getElementById('post-text').value;
            const img = document.getElementById('post-img-url').value;
            if(!text.trim()) return alert("Напиши хоть что-нибудь!");

            await addDoc(collection(db, "posts"), {
                text: text,
                imageUrl: img,
                authorId: currentUser.uid,
                authorName: currentUser.displayName,
                likes: [],
                createdAt: serverTimestamp()
            });

            document.getElementById('post-text').value = "";
            document.getElementById('post-img-url').value = "";
        };

        // ЗАГРУЗКА ПОСТОВ
        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const id = d.id;
                    const isLiked = currentUser && p.likes?.includes(currentUser.uid);
                    const isMyPost = currentUser && p.authorId === currentUser.uid;

                    feed.innerHTML += `
                        <div class="post">
                            <div class="post-header">
                                <span>@${p.authorName}</span>
                                <span>${p.createdAt ? new Date(p.createdAt.toDate()).toLocaleDateString() : 'только что'}</span>
                            </div>
                            <div class="post-text">${p.text}</div>
                            ${p.imageUrl ? `<img src="${p.imageUrl}" class="post-img">` : ''}
                            <div class="post-footer">
                                <button class="like-btn ${isLiked ? 'active' : ''}" onclick="toggleLike('${id}', ${JSON.stringify(p.likes)})">
                                    ${isLiked ? '❤️' : '🤍'} ${p.likes?.length || 0}
                                </button>
                                ${isMyPost ? `<button class="delete-btn" onclick="deletePost('${id}')">Удалить</button>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        window.toggleLike = async (id, likes) => {
            if(!currentUser) return openModal();
            const ref = doc(db, "posts", id);
            await updateDoc(ref, {
                likes: likes.includes(currentUser.uid) ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
            });
        };

        window.deletePost = async (id) => {
            if(confirm("Удалить этот пост?")) await deleteDoc(doc(db, "posts", id));
        };
    </script>
</body>
</html>

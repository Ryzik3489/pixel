<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL PRO - Modal Auth</title>
    <style>
        :root {
            --bg-dark: #333333;
            --panel-gray: #8c8c8c;
            --button-gray: #6e6e6e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: var(--bg-dark); display: flex; justify-content: center; padding: 20px; color: white; }
        .container { display: flex; width: 100%; max-width: 1200px; gap: 20px; height: 92vh; }

        /* Sidebar & Main */
        .sidebar { background: var(--panel-gray); width: 280px; border-radius: 35px; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .main-content { flex-grow: 1; background: var(--panel-gray); border-radius: 35px; padding: 25px; overflow-y: auto; color: black; }
        .logo-box { background: var(--button-gray); border-radius: 20px; padding: 25px; text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 4px; }
        
        .nav-btn { background: var(--button-gray); border: none; border-radius: 20px; padding: 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn:hover { background: #555; color: white; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; /* Скрыто по умолчанию */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--panel-gray);
            padding: 40px;
            border-radius: 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        .auth-title { color: black; font-weight: 900; margin-bottom: 25px; font-size: 20px; }

        .auth-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }

        .btn-google { background: #db4437; }
        .btn-github { background: #333; }
        .btn-mail { background: #4285f4; }
        .auth-btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* Посты */
        .post { background: var(--button-gray); border-radius: 25px; padding: 20px; margin-bottom: 15px; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo-box">PIXEL</div>
            <button class="nav-btn" onclick="openModal()">ВХОД <span>👤</span></button>
            <button class="nav-btn">ПОСТЫ <span>+</span></button>
            <button class="nav-btn">ИНВЕНТ</button>
        </aside>

        <main class="main-content">
            <div id="feed">Войдите, чтобы видеть посты и лайкать...</div>
        </main>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="auth-title">ВЫБЕРИТЕ СПОСОБ</div>
            
            <button class="auth-btn btn-google" onclick="login('google')">GOOGLE</button>
            <button class="auth-btn btn-github" onclick="login('github')">GITHUB</button>
            <button class="auth-btn btn-mail" onclick="loginEmail()">ПОЧТА</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, GithubAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Твой конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Функции окна
        window.openModal = () => document.getElementById('authModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('authModal').style.display = 'none';

        // Закрытие при клике мимо окна
        window.onclick = (event) => {
            if (event.target == document.getElementById('authModal')) closeModal();
        }

        // Логин
        window.login = async (type) => {
            const provider = type === 'google' ? new GoogleAuthProvider() : new GithubAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                closeModal();
            } catch(e) { alert("Ошибка: " + e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('feed').innerHTML = "Привет, " + (user.displayName || user.email) + "! Теперь ты в системе.";
            }
        });
    </script>
</body>
</html>

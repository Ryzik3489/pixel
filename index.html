<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel — Next Gen Messenger</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #0f172a; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .message-in { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Твой конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Приложение на React
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const scrollRef = useRef();

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (u) => setUser(u));
                return unsub;
            }, []);

            useEffect(() => {
                if (user) {
                    const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        setMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        setTimeout(() => scrollRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
                    return unsubscribe;
                }
            }, [user]);

            const handleAuth = async (type) => {
                try {
                    if (type === 'login') await signInWithEmailAndPassword(auth, email, password);
                    else await createUserWithEmailAndPassword(auth, email, password);
                } catch (e) { alert(e.message); }
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;
                await addDoc(collection(db, "messages"), {
                    text: input,
                    uid: user.uid,
                    email: user.email,
                    createdAt: serverTimestamp()
                });
                setInput('');
            };

            if (!user) return (
                <div className="flex items-center justify-center h-screen p-4">
                    <div className="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-3xl font-bold shadow-lg shadow-blue-500/50 mb-4">P</div>
                            <h1 className="text-2xl font-bold">Pixel 2026</h1>
                            <p className="text-gray-400 text-sm">Войдите, чтобы начать общение</p>
                        </div>
                        <input type="email" placeholder="Email" className="w-full mb-3 p-3 rounded-xl bg-white/10 border border-white/10 outline-none focus:ring-2 ring-blue-500 transition" onChange={e => setEmail(e.target.value)} />
                        <input type="password" placeholder="Пароль" className="w-full mb-6 p-3 rounded-xl bg-white/10 border border-white/10 outline-none focus:ring-2 ring-blue-500 transition" onChange={e => setPassword(e.target.value)} />
                        <div className="flex gap-3">
                            <button onClick={() => handleAuth('login')} className="flex-1 bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-bold transition">Вход</button>
                            <button onClick={() => handleAuth('reg')} className="flex-1 bg-white/10 hover:bg-white/20 p-3 rounded-xl font-bold transition border border-white/10">Регистрация</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen p-4 gap-4 max-w-[1400px] mx-auto">
                    <div className="hidden md:flex flex-col w-64 glass rounded-3xl p-4">
                        <div className="flex items-center gap-3 mb-8 px-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">P</div>
                            <span className="font-bold text-xl tracking-tight">Pixel</span>
                        </div>
                        <div className="space-y-2">
                            <div className="flex items-center gap-3 p-3 bg-blue-600 rounded-xl cursor-pointer"><i className="fa-solid fa-comment"></i> Чаты</div>
                            <div className="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl cursor-pointer text-gray-400"><i className="fa-solid fa-hashtag"></i> Каналы</div>
                            <div className="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl cursor-pointer text-gray-400"><i className="fa-solid fa-robot"></i> AI Ассистент</div>
                        </div>
                        <div className="mt-auto p-2 border-t border-white/10 pt-4">
                            <p className="text-xs text-gray-500 truncate mb-2">{user.email}</p>
                            <button onClick={() => signOut(auth)} className="text-red-400 text-sm hover:underline"><i className="fa-solid fa-right-from-bracket mr-2"></i>Выйти</button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col glass rounded-3xl overflow-hidden shadow-2xl">
                        <header className="p-4 border-b border-white/10 flex justify-between items-center bg-white/5">
                            <div>
                                <h2 className="font-bold">Главный чат</h2>
                                <p className="text-xs text-green-400">● 2026 Online</p>
                            </div>
                            <i className="fa-solid fa-ellipsis-vertical text-gray-400 cursor-pointer"></i>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                            {messages.map(m => (
                                <div key={m.id} className={`flex ${m.uid === user.uid ? 'justify-end' : 'justify-start'} message-in`}>
                                    <div className={`max-w-[80%] p-3 rounded-2xl shadow-sm ${m.uid === user.uid ? 'bg-blue-600 rounded-tr-none' : 'bg-white/10 border border-white/10 rounded-tl-none'}`}>
                                        <p className="text-[10px] opacity-50 mb-1">{m.email.split('@')[0]}</p>
                                        <p className="text-sm leading-relaxed">{m.text}</p>
                                    </div>
                                </div>
                            ))}
                            <div ref={scrollRef}></div>
                        </div>

                        <form onSubmit={sendMessage} className="p-4 bg-white/5 flex gap-3">
                            <div className="flex-1 relative">
                                <input 
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                    placeholder="Ваше сообщение..." 
                                    className="w-full bg-white/10 border border-white/10 rounded-2xl py-3 px-4 outline-none focus:ring-2 ring-blue-500 transition-all"
                                />
                            </div>
                            <button type="submit" className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center hover:bg-blue-500 transition shadow-lg shadow-blue-600/30">
                                <i className="fa-solid fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Messenger Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.fb = { doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp, orderBy };
    </script>

    <style>
        body { background: #0e1621; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(23, 33, 43, 0.95); backdrop-filter: blur(20px); }
        .sidebar { width: 350px; border-right: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; position: relative; margin-bottom: 6px; }
        .msg-out { background: #2b5278; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-in { background: #182533; align-self: flex-start; border-bottom-left-radius: 4px; }
        .setting-item { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; border-radius: 10px; transition: 0.2s; }
        .setting-item:hover { background: rgba(255,255,255,0.05); }
        .setting-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin-right: 15px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [accounts, setAccounts] = useState(JSON.parse(localStorage.getItem('pixel_accounts')) || []);
            const [activeIdx, setActiveIdx] = useState(0);
            const [view, setView] = useState('chats'); // 'chats' или 'settings'
            const [chats, setChats] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const user = accounts[activeIdx];

            useEffect(() => {
                if (!user) return;
                const q = window.fb.query(window.fb.collection(window.db, "conversations"), window.fb.where("participants", "array-contains", user.username));
                return window.fb.onSnapshot(q, (snap) => {
                    const list = [];
                    snap.forEach(doc => list.push({ id: doc.id, ...doc.data(), other: doc.data().participants.find(p => p !== user.username) }));
                    setChats(list);
                });
            }, [user]);

            useEffect(() => {
                if (!activeChat) return;
                const q = window.fb.query(window.fb.collection(window.db, "conversations", activeChat.id, "messages"), window.fb.orderBy("timestamp", "asc"));
                return window.fb.onSnapshot(q, (snap) => {
                    const m = [];
                    snap.forEach(d => m.push({ id: d.id, ...d.data() }));
                    setMessages(m);
                });
            }, [activeChat]);

            const sendMessage = async () => {
                if (!input.trim() || !activeChat) return;
                const text = input; setInput('');
                const chatRef = window.fb.doc(window.db, "conversations", activeChat.id);
                await window.fb.addDoc(window.fb.collection(chatRef, "messages"), {
                    text, sender: user.username, timestamp: window.fb.serverTimestamp()
                });
                await window.fb.updateDoc(chatRef, { lastMsg: text, lastUpdate: window.fb.serverTimestamp() });
            };

            const addAccount = () => {
                const name = prompt("Имя:");
                const username = prompt("@username:").replace('@','').toLowerCase();
                if(name && username) {
                    const newAccs = [...accounts, { name, username }];
                    setAccounts(newAccs);
                    localStorage.setItem('pixel_accounts', JSON.stringify(newAccs));
                }
            };

            if (!user) return <div className="h-screen flex items-center justify-center"><button onClick={addAccount} className="bg-blue-600 p-4 rounded-xl">Создать аккаунт</button></div>;

            return (
                <div className="flex h-screen w-full">
                    {/* LEFT SIDEBAR */}
                    <div className="sidebar glass flex flex-col">
                        <div className="p-4 flex items-center justify-between border-b border-white/5">
                            <div className="flex gap-2">
                                {accounts.map((acc, i) => (
                                    <div key={i} onClick={() => {setActiveIdx(i); setView('chats');}} className={`w-9 h-9 rounded-full cursor-pointer flex items-center justify-center font-bold text-xs ${activeIdx === i ? 'ring-2 ring-blue-500 bg-blue-600' : 'bg-gray-700'}`}>{acc.name[0]}</div>
                                ))}
                                <div onClick={addAccount} className="w-9 h-9 rounded-full bg-gray-800 flex items-center justify-center cursor-pointer">+</div>
                            </div>
                            <div onClick={() => setView(view === 'chats' ? 'settings' : 'chats')} className="cursor-pointer text-gray-400 hover:text-white transition">
                                <i className={`fa-solid ${view === 'chats' ? 'fa-gear' : 'fa-arrow-left'} text-xl`}></i>
                            </div>
                        </div>

                        {view === 'chats' ? (
                            <div className="flex-1 overflow-y-auto">
                                <div className="p-4 font-bold text-blue-400 uppercase text-xs tracking-widest opacity-50">Чаты</div>
                                {chats.map(chat => (
                                    <div key={chat.id} onClick={() => setActiveChat(chat)} className={`p-4 flex items-center cursor-pointer ${activeChat?.id === chat.id ? 'bg-[#2b5278]' : 'hover:bg-white/5'}`}>
                                        <div className="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-indigo-800 mr-3 flex items-center justify-center font-bold">{chat.other[0].toUpperCase()}</div>
                                        <div className="flex-1 truncate">
                                            <div className="text-sm font-bold">@{chat.other}</div>
                                            <div className="text-xs text-gray-400 truncate">{chat.lastMsg}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="flex-1 overflow-y-auto p-2">
                                <div className="p-6 text-center">
                                    <div className="w-20 h-20 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold">{user.name[0]}</div>
                                    <div className="text-xl font-bold">{user.name}</div>
                                    <div className="text-gray-500 text-sm">@{user.username}</div>
                                </div>

                                <div className="space-y-1">
                                    <div className="p-2 text-xs font-bold text-blue-500 uppercase ml-4 mt-4">Настройки</div>
                                    <div className="setting-item"><div className="setting-icon bg-blue-500"><i className="fa-solid fa-bell"></i></div><span>Уведомления и звуки</span></div>
                                    <div className="setting-item"><div className="setting-icon bg-green-500"><i className="fa-solid fa-lock"></i></div><span>Конфиденциальность</span></div>
                                    <div className="setting-item"><div className="setting-icon bg-yellow-500"><i className="fa-solid fa-database"></i></div><span>Данные и память</span></div>
                                    <div className="setting-item"><div className="setting-icon bg-purple-500"><i className="fa-solid fa-folder"></i></div><span>Папки с чатами</span></div>
                                    
                                    <div className="p-2 text-xs font-bold text-red-500 uppercase ml-4 mt-4">Опасная зона</div>
                                    <div className="setting-item text-red-400" onClick={() => {localStorage.clear(); location.reload();}}>
                                        <div className="setting-icon bg-red-900/30 text-red-500"><i className="fa-solid fa-right-from-bracket"></i></div>
                                        <span>Выйти из всех аккаунтов</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* CHAT AREA */}
                    <div className="flex-1 flex flex-col bg-[#0e1621]">
                        {activeChat ? (
                            <>
                                <div className="h-16 bg-[#17212b] flex items-center px-6 justify-between border-b border-black/20">
                                    <div className="font-bold">@{activeChat.other}</div>
                                    <i className="fa-solid fa-magnifying-glass text-gray-500 cursor-pointer"></i>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 flex flex-col">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`msg ${m.sender === user.username ? 'msg-out' : 'msg-in'}`}>{m.text}</div>
                                    ))}
                                </div>
                                <div className="p-4 bg-[#17212b] flex gap-4">
                                    <input className="flex-1 bg-transparent outline-none" placeholder="Написать..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} />
                                    <button onClick={sendMessage} className="text-blue-400 font-bold uppercase text-xs">Отправить</button>
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 flex items-center justify-center opacity-10 flex-col">
                                <i className="fa-solid fa-paper-plane text-9xl mb-4"></i>
                                <span className="text-xl">Выберите чат или откройте настройки</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

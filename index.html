<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Messenger Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f",
            measurementId: "G-E35TB02ENB"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.fb = { doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, limit };
    </script>

    <style>
        * { font-family: 'Inter', sans-serif; transition: all 0.2s ease; }
        body { background: #080a0f; color: white; overflow: hidden; }
        .pixel-bg { background: radial-gradient(circle at top right, #1e293b, #080a0f); }
        .glass { background: rgba(23, 33, 43, 0.75); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar { width: 350px; border-right: 1px solid rgba(255,255,255,0.05); }
        .msg-bubble { max-width: 75%; padding: 10px 14px; font-size: 14px; position: relative; }
        .msg-out { background: linear-gradient(135deg, #3390ec, #2b7ecb); border-radius: 18px 18px 4px 18px; align-self: flex-end; box-shadow: 0 4px 15px rgba(51,144,236,0.2); }
        .msg-in { background: #182533; border-radius: 18px 18px 18px 4px; align-self: flex-start; }
        .active-chat { background: rgba(51, 144, 236, 0.15); border-left: 3px solid #3390ec; }
        input::placeholder { color: #6b7280; }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shimmer { animation: shimmer 2s infinite linear; background: linear-gradient(to right, #182533 4%, #242f3d 25%, #182533 36%); background-size: 1000px 100%; }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('pixel_user')));
            const [isRegistering, setIsRegistering] = useState(false);
            const [activeChat, setActiveChat] = useState(null);
            const [chatList, setChatList] = useState([]);
            const [search, setSearch] = useState('');
            const [inputMsg, setInputMsg] = useState('');
            const [messages, setMessages] = useState([]);
            const msgEndRef = useRef(null);

            // Сохранение чатов в облако/локально
            useEffect(() => {
                if (user) {
                    const localChats = JSON.parse(localStorage.getItem(`chats_${user.username}`)) || [];
                    setChatList(localChats);
                }
            }, [user]);

            useEffect(() => {
                msgEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            // Функция регистрации/входа
            const handleAuth = async (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const username = e.target.username.value.toLowerCase().trim();
                if (!name || !username) return;

                const userRef = window.fb.doc(window.db, "users", username);
                const docSnap = await window.fb.getDoc(userRef);

                if (docSnap.exists() && isRegistering) {
                    alert("Этот @username уже занят!");
                    return;
                }

                const userData = { name, username, joinedAt: Date.now() };
                await window.fb.setDoc(userRef, userData);
                localStorage.setItem('pixel_user', JSON.stringify(userData));
                setUser(userData);
            };

            // Глобальный поиск и создание чата
            const handleSearch = async () => {
                const target = search.replace('@', '').toLowerCase().trim();
                if (!target || target === user.username) return;

                const userSnap = await window.fb.getDoc(window.fb.doc(window.db, "users", target));
                if (userSnap.exists()) {
                    const newChat = { id: target, name: userSnap.data().name, type: 'user' };
                    if (!chatList.find(c => c.id === target)) {
                        const updated = [newChat, ...chatList];
                        setChatList(updated);
                        localStorage.setItem(`chats_${user.username}`, JSON.stringify(updated));
                    }
                    setActiveChat(newChat);
                    setSearch('');
                } else {
                    alert("Пользователь не найден в системе Pixel");
                }
            };

            // Real-time прослушка сообщений
            useEffect(() => {
                if (!activeChat || !user) return;
                const pairId = [user.username, activeChat.id].sort().join('___');
                const q = window.fb.query(
                    window.fb.collection(window.db, "chats", pairId, "messages"),
                    window.fb.orderBy("timestamp", "asc"),
                    window.fb.limit(100)
                );

                const unsub = window.fb.onSnapshot(q, (snap) => {
                    const list = [];
                    snap.forEach(d => list.push(d.data()));
                    setMessages(list);
                });
                return () => unsub();
            }, [activeChat]);

            // Отправка сообщения
            const send = async () => {
                if (!inputMsg.trim() || !activeChat) return;
                const pairId = [user.username, activeChat.id].sort().join('___');
                const text = inputMsg;
                setInputMsg('');

                await window.fb.addDoc(window.fb.collection(window.db, "chats", pairId, "messages"), {
                    text,
                    sender: user.username,
                    timestamp: window.fb.serverTimestamp()
                });
            };

            // Экран авторизации
            if (!user) return (
                <div className="h-screen flex items-center justify-center pixel-bg p-4">
                    <div className="glass p-8 rounded-3xl w-full max-w-md shadow-2xl border border-white/10">
                        <div className="text-center mb-10">
                            <h1 className="text-5xl font-bold gradient-text mb-2">Pixel</h1>
                            <p className="text-gray-400 text-sm">Next-Gen Messaging 2026</p>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <div>
                                <label className="text-xs text-gray-500 ml-2 mb-1 block uppercase tracking-widest">Полное имя</label>
                                <input name="name" className="tg-input focus:ring-2 ring-blue-500/20" placeholder="Напр. Илья" required />
                            </div>
                            <div>
                                <label className="text-xs text-gray-500 ml-2 mb-1 block uppercase tracking-widest">Юзернейм</label>
                                <div className="relative">
                                    <span className="absolute left-4 top-3 text-gray-500">@</span>
                                    <input name="username" className="tg-input pl-8" placeholder="username" required />
                                </div>
                            </div>
                            <button className="btn-blue w-full mt-4 text-lg py-4 shadow-lg shadow-blue-500/20">
                                {isRegistering ? "Создать аккаунт" : "Войти в систему"}
                            </button>
                        </form>
                        <p className="text-center mt-6 text-sm text-gray-400">
                            {isRegistering ? "Уже есть аккаунт?" : "Впервые здесь?"}{" "}
                            <span className="text-blue-400 cursor-pointer font-semibold" onClick={() => setIsRegistering(!isRegistering)}>
                                {isRegistering ? "Войти" : "Регистрация"}
                            </span>
                        </p>
                    </div>
                </div>
            );

            // Главный интерфейс
            return (
                <div className="h-screen flex pixel-bg overflow-hidden">
                    {/* LEFT SIDEBAR */}
                    <div className="sidebar glass flex flex-col z-20">
                        <div className="p-5 flex flex-col gap-4 shadow-lg">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center font-bold text-white shadow-lg">
                                        {user.name[0]}
                                    </div>
                                    <div className="flex flex-col">
                                        <span className="text-sm font-bold">{user.name}</span>
                                        <span className="text-[10px] text-blue-400 font-mono italic">@{user.username}</span>
                                    </div>
                                </div>
                                <i className="fa-solid fa-power-off text-gray-500 hover:text-red-500 cursor-pointer text-sm" onClick={() => {localStorage.clear(); location.reload();}}></i>
                            </div>
                            <div className="relative">
                                <i className="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-500 text-sm"></i>
                                <input 
                                    className="bg-[#0e1621] w-full rounded-xl pl-10 pr-4 py-3 text-xs outline-none focus:ring-1 ring-blue-500/50" 
                                    placeholder="Поиск по @username..." 
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleSearch()}
                                />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                            <div className="p-2 space-y-1">
                                {chatList.map(chat => (
                                    <div 
                                        key={chat.id} 
                                        onClick={() => setActiveChat(chat)}
                                        className={`p-4 flex items-center gap-4 cursor-pointer rounded-2xl mx-2 transition-all duration-300 ${activeChat?.id === chat.id ? 'active-chat shadow-xl' : 'hover:bg-white/5'}`}
                                    >
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg shadow-inner ${chat.id === 'saved' ? 'bg-blue-600' : 'bg-gray-700'}`}>
                                            {chat.id === 'saved' ? <i className="fa-solid fa-bookmark"></i> : chat.name[0]}
                                        </div>
                                        <div className="flex-1 overflow-hidden">
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-sm font-semibold truncate">{chat.name}</span>
                                                <span className="text-[10px] text-gray-500 italic">22:04</span>
                                            </div>
                                            <div className="text-xs text-gray-400 truncate opacity-70">Нажмите, чтобы открыть чат</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* MAIN CHAT AREA */}
                    <div className="flex-1 flex flex-col relative">
                        {activeChat ? (
                            <>
                                <div className="h-20 glass flex items-center justify-between px-8 z-10 shadow-xl">
                                    <div className="flex items-center gap-4">
                                        <div className="w-11 h-11 rounded-full bg-gray-800 flex items-center justify-center border border-white/10 font-bold">{activeChat.name[0]}</div>
                                        <div>
                                            <div className="font-bold text-sm tracking-wide">{activeChat.name}</div>
                                            <div className="text-[10px] text-blue-400 flex items-center gap-1">
                                                <span className="w-1.5 h-1.5 bg-blue-400 rounded-full animate-pulse"></span> в сети
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-6 text-gray-400">
                                        <i className="fa-solid fa-phone hover:text-white cursor-pointer"></i>
                                        <i className="fa-solid fa-camera-retro hover:text-white cursor-pointer"></i>
                                        <i className="fa-solid fa-ellipsis-vertical hover:text-white cursor-pointer"></i>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-y-auto p-8 flex flex-col gap-3">
                                    <div className="flex justify-center mb-4">
                                        <span className="glass px-4 py-1 rounded-full text-[10px] uppercase tracking-tighter text-gray-500">Сегодня</span>
                                    </div>
                                    {messages.map((m, i) => (
                                        <div key={i} className={`msg-bubble shadow-lg ${m.sender === user.username ? 'msg-out' : 'msg-in animate-in fade-in slide-in-from-left-4'}`}>
                                            {m.text}
                                            <div className="text-[9px] mt-1 opacity-50 text-right">
                                                {m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...'}
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={msgEndRef} />
                                </div>

                                <div className="p-6 bg-transparent">
                                    <div className="glass rounded-2xl p-2 flex items-center gap-3 shadow-2xl border border-white/5">
                                        <button className="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-blue-400"><i className="fa-solid fa-paperclip text-lg"></i></button>
                                        <input 
                                            className="bg-transparent flex-1 outline-none text-sm py-2" 
                                            placeholder="Введите сообщение..." 
                                            value={inputMsg}
                                            onChange={e => setInputMsg(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && send()}
                                        />
                                        <button className="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-yellow-500"><i className="fa-solid fa-face-smile text-lg"></i></button>
                                        <button 
                                            onClick={send}
                                            className="w-12 h-12 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30 active:scale-90 transition-all"
                                        >
                                            <i className="fa-solid fa-paper-plane text-white"></i>
                                        </button>
                                    </div>
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center opacity-20">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" className="w-32 mb-6 grayscale" />
                                <p className="text-xl font-light">Выберите чат или найдите собеседника по @нику</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

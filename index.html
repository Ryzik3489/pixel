<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL v1.7 Ultra Final</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #0b0b0d; --panel: #1c1c1e; --accent: #007bff; --text: #ffffff; --gray: #8e8e93; --border: #2c2c2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Сайдбар */
        .sidebar { width: 260px; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 30px; padding-left: 15px; display: flex; align-items: center; gap: 8px; }
        .logo span { font-size: 12px; color: var(--gray); font-weight: normal; }
        
        .nav-btn { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: var(--gray); transition: 0.2s; text-decoration: none; }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }

        /* Контент */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none; }
        .tabs { display: flex; justify-content: center; gap: 40px; padding: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .tab { color: var(--gray); cursor: pointer; font-size: 14px; padding-bottom: 5px; }
        .tab.active { color: var(--text); border-bottom: 2px solid var(--text); }

        /* Посты */
        .post { background: var(--panel); width: 100%; max-width: 600px; border-radius: 20px; padding: 20px; margin: 15px auto; border: 1px solid #222; }
        .editor { background: var(--panel); max-width: 600px; margin: 20px auto; border-radius: 20px; padding: 20px; }
        textarea { width: 100%; background: none; border: none; color: white; outline: none; resize: none; font-size: 16px; min-height: 50px; }
        
        /* Опросы */
        .poll-box { margin-top: 15px; background: #111; border-radius: 12px; padding: 15px; border: 1px solid #333; }
        .poll-opt { position: relative; background: #222; margin-bottom: 8px; border-radius: 8px; height: 42px; display: flex; align-items: center; padding: 0 12px; cursor: pointer; overflow: hidden; }
        .poll-bar { position: absolute; left: 0; top: 0; height: 100%; background: rgba(0, 123, 255, 0.4); transition: 0.6s ease; z-index: 1; }
        .poll-txt { position: relative; z-index: 2; width: 100%; display: flex; justify-content: space-between; font-size: 14px; }

        .post-actions { display: flex; gap: 25px; margin-top: 15px; color: var(--gray); font-size: 14px; }
        .action:hover { color: var(--text); cursor: pointer; }
        .hashtag { color: var(--accent); }

        .section { display: none; }
        .section.active { display: block; }
        
        .btn-pub { background: #d1d1d6; color: black; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">ИТД <span>v1.1 beta</span></div>
        <div class="nav-btn active" onclick="nav('feed', this)"><i class="bi bi-house-door-fill"></i> Лента</div>
        <div class="nav-btn" onclick="nav('search', this)"><i class="bi bi-search"></i> Поиск</div>
        <div class="nav-btn" onclick="nav('profile', this)"><i class="bi bi-person"></i> Профиль</div>
        
        <div class="nav-btn" style="margin-top:auto; color:#ff453a;" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Выйти
        </div>
    </aside>

    <main class="main-content">
        <div class="tabs">
            <div class="tab active">Для вас</div>
            <div class="tab">Подписки</div>
        </div>

        <div id="sec-feed" class="section active">
            <div class="editor">
                <div style="display:flex; gap:12px;">
                    <div id="my-av-small" style="width:40px; height:40px; border-radius:50%; background:#333; background-size:cover;"></div>
                    <textarea id="post-text" placeholder="Что нового?"></textarea>
                </div>
                <div id="poll-editor" style="display:none; margin-top:10px; border-top:1px solid #333; padding-top:10px;">
                    <input type="text" id="poll-q" placeholder="Вопрос" style="width:100%; background:#0b0b0d; border:1px solid #333; color:white; padding:8px; border-radius:8px; margin-bottom:5px;">
                    <input type="text" id="poll-o1" placeholder="Вариант 1" style="width:49%; background:#0b0b0d; border:1px solid #333; color:white; padding:8px; border-radius:8px;">
                    <input type="text" id="poll-o2" placeholder="Вариант 2" style="width:49%; background:#0b0b0d; border:1px solid #333; color:white; padding:8px; border-radius:8px;">
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                    <div style="display:flex; gap:20px; color:var(--gray); font-size:20px;">
                        <i class="bi bi-bar-chart action" onclick="document.getElementById('poll-editor').style.display='block'"></i>
                        <i class="bi bi-emoji-smile"></i>
                    </div>
                    <button class="btn-pub" onclick="sendPost()">Опубликовать</button>
                </div>
            </div>
            <div id="feed-items"></div>
        </div>

        <div id="sec-search" class="section">
            <input type="text" id="search-in" oninput="doSearch(this.value)" placeholder="Поиск постов или #хештегов..." style="width:100%; max-width:600px; display:block; margin:20px auto; background:var(--panel); border:1px solid var(--border); padding:12px 20px; border-radius:30px; color:white; outline:none;">
            <div id="search-results"></div>
        </div>

        <div id="sec-profile" class="section">
            <div style="text-align:center; padding:40px;">
                <div id="my-av" style="width:100px; height:100px; border-radius:50%; background-size:cover; margin:0 auto 15px; border:2px solid #333;"></div>
                <h2 id="my-name">...</h2>
                <button onclick="logout()" style="margin-top:20px; background:#ff453a; color:white; border:none; padding:8px 20px; border-radius:10px; cursor:pointer;">Выйти</button>
                <div id="my-posts-list" style="margin-top:30px;"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, postsGlobal = [];

        onAuthStateChanged(auth, (u) => {
            if(u) { 
                user = u; 
                document.getElementById('my-name').innerText = u.displayName;
                document.getElementById('my-av').style.backgroundImage = `url(${u.photoURL})`;
                document.getElementById('my-av-small').style.backgroundImage = `url(${u.photoURL})`;
                initApp(); 
            } else { signInWithPopup(auth, new GoogleAuthProvider()); }
        });

        window.logout = () => signOut(auth).then(() => location.reload());

        window.nav = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id === 'profile') render(postsGlobal.filter(p => p.uid === user.uid), 'my-posts-list');
        };

        async function initApp() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                postsGlobal = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(postsGlobal, 'feed-items');
                snap.docs.forEach(d => updateDoc(doc(db, "posts", d.id), { views: increment(1) }));
            });
        }

        function render(data, target) {
            const container = document.getElementById(target);
            container.innerHTML = "";
            data.forEach(p => {
                const total = (p.poll?.v1 || 0) + (p.poll?.v2 || 0);
                const pc1 = total ? Math.round((p.poll.v1 / total) * 100) : 0;
                const pc2 = total ? Math.round((p.poll.v2 / total) * 100) : 0;
                const isLiked = p.likes?.includes(user?.uid);

                container.innerHTML += `
                    <div class="post">
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                            <div style="display:flex; gap:10px; align-items:center;">
                                <div style="width:35px; height:35px; border-radius:50%; background:url(${p.av}); background-size:cover;"></div>
                                <b>${p.author}</b>
                            </div>
                            <div style="display:flex; gap:15px;">
                                ${p.uid === user.uid ? `<i class="bi bi-trash action" style="color:#ff453a" onclick="deletePost('${p.id}')"></i>` : ''}
                                <i class="bi bi-exclamation-octagon action" onclick="report('${p.id}', '${p.author}')"></i>
                            </div>
                        </div>
                        <div style="font-size:16px;">${p.text.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>')}</div>
                        
                        ${p.poll ? `
                            <div class="poll-box">
                                <b style="display:block; margin-bottom:10px;">${p.poll.q}</b>
                                <div class="poll-opt" onclick="vote('${p.id}', 1)"><div class="poll-bar" style="width:${pc1}%"></div><div class="poll-txt"><span>${p.poll.o1}</span><span>${pc1}%</span></div></div>
                                <div class="poll-opt" onclick="vote('${p.id}', 2)"><div class="poll-bar" style="width:${pc2}%"></div><div class="poll-txt"><span>${p.poll.o2}</span><span>${pc2}%</span></div></div>
                                <small style="color:gray;">Голосов: ${total}</small>
                            </div>` : ''}

                        <div class="post-actions">
                            <span class="action" onclick="like('${p.id}', ${JSON.stringify(p.likes)})"><i class="bi ${isLiked?'bi-heart-fill':'bi-heart'}" style="${isLiked?'color:red':''}"></i> ${p.likes?.length || 0}</span>
                            <span class="action"><i class="bi bi-graph-up"></i> ${p.views || 0}</span>
                        </div>
                    </div>`;
            });
        }

        window.sendPost = async () => {
            const t = document.getElementById('post-text').value, q = document.getElementById('poll-q').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), {
                text: t, author: user.displayName, av: user.photoURL, uid: user.uid,
                poll: q ? { q, o1: document.getElementById('poll-o1').value, o2: document.getElementById('poll-o2').value, v1:0, v2:0 } : null,
                likes: [], views: 0, time: serverTimestamp()
            });
            document.getElementById('post-text').value = ""; document.getElementById('poll-editor').style.display = 'none';
        };

        window.deletePost = async (id) => { if(confirm("Удалить пост навсегда?")) await deleteDoc(doc(db, "posts", id)); };
        
        window.vote = async (id, opt) => { await updateDoc(doc(db, "posts", id), { [`poll.v${opt}`]: increment(1) }); };
        
        window.like = async (id, likes) => {
            const r = doc(db, "posts", id);
            await updateDoc(r, { likes: likes.includes(user.uid) ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };

        window.doSearch = (v) => render(postsGlobal.filter(p => p.text.toLowerCase().includes(v.toLowerCase())), 'search-results');

        window.report = (id, author) => {
            window.location.href = `mailto:ryzik3489@gmail.com?subject=PIXEL REPORT&body=Post ID: ${id}\nAuthor: ${author}`;
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel — Firebase Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f",
            measurementId: "G-E35TB02ENB"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.fb = { doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy };
    </script>

    <style>
        body { background-color: #0e1621; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .sidebar { background: #17212b; width: 320px; border-right: 1px solid #080d14; }
        .tg-input { background: #17212b; border: 1px solid #242f3d; padding: 12px; border-radius: 10px; width: 100%; outline: none; color: white; }
        .btn-blue { background: #3390ec; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; cursor: pointer; border: none; color: white; }
        .message-out { background: #2b5278; align-self: flex-end; border-radius: 12px 12px 2px 12px; }
        .message-in { background: #182533; align-self: flex-start; border-radius: 12px 12px 12px 2px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('pixel_user')));
            const [view, setView] = useState('main');
            const [activeChat, setActiveChat] = useState(null);
            const [chats, setChats] = useState([]);
            const [search, setSearch] = useState('');
            const [msg, setMsg] = useState('');
            const [messages, setMessages] = useState([]);

            // 1. Авторизация (сохранение в Firestore)
            const handleJoin = async () => {
                const name = prompt("Ваше имя:");
                const username = prompt("Ваш @username (без собаки):").toLowerCase();
                if(!name || !username) return;

                const userRef = window.fb.doc(window.db, "users", username);
                await window.fb.setDoc(userRef, { name, username, status: 'online' });
                
                const userData = { name, username };
                localStorage.setItem('pixel_user', JSON.stringify(userData));
                setUser(userData);
            };

            // 2. Поиск другого пользователя
            const startChat = async () => {
                const target = search.replace('@', '').toLowerCase();
                if(target === user.username) return alert("Это вы!");
                
                const docRef = window.fb.doc(window.db, "users", target);
                const docSnap = await window.fb.getDoc(docRef);

                if (docSnap.exists()) {
                    const newChat = { id: target, name: docSnap.data().name };
                    setActiveChat(newChat);
                    if(!chats.find(c => c.id === target)) setChats([...chats, newChat]);
                    setSearch('');
                } else {
                    alert("Пользователь не найден в Firebase");
                }
            };

            // 3. Подписка на сообщения в реальном времени
            useEffect(() => {
                if (!activeChat || !user) return;

                const chatId = [user.username, activeChat.id].sort().join('_');
                const q = window.fb.query(
                    window.fb.collection(window.db, "messages", chatId, "chat"),
                    window.fb.orderBy("timestamp", "asc")
                );

                const unsubscribe = window.fb.onSnapshot(q, (snapshot) => {
                    const msgs = [];
                    snapshot.forEach(doc => msgs.push(doc.data()));
                    setMessages(msgs);
                });

                return () => unsubscribe();
            }, [activeChat]);

            // 4. Отправка сообщения в Облако
            const sendMessage = async () => {
                if(!msg.trim()) return;
                const chatId = [user.username, activeChat.id].sort().join('_');
                
                await window.fb.addDoc(window.fb.collection(window.db, "messages", chatId, "chat"), {
                    text: msg,
                    sender: user.username,
                    timestamp: window.fb.serverTimestamp()
                });
                setMsg('');
            };

            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen">
                    <h1 className="text-4xl font-bold mb-8">Pixel Cloud</h1>
                    <button onClick={handleJoin} className="btn-blue w-64">СОЗДАТЬ АККАУНТ</button>
                </div>
            );

            return (
                <div className="flex h-screen w-full">
                    {/* Sidebar */}
                    <div className="sidebar flex flex-col">
                        <div className="p-4 border-b border-gray-800">
                            <input 
                                className="bg-[#242f3d] rounded-full px-4 py-2 text-sm w-full outline-none" 
                                placeholder="Найти @username..." 
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && startChat()}
                            />
                        </div>
                        <div className="flex-1 overflow-y-auto">
                            <div onClick={() => setActiveChat({id: 'saved', name: 'Избранное'})} className="p-4 hover:bg-[#232e3a] cursor-pointer flex items-center">
                                <div className="w-10 h-10 rounded-full bg-blue-600 mr-3 flex items-center justify-center"><i className="fa-solid fa-bookmark"></i></div>
                                <span className="text-sm font-bold">Избранное</span>
                            </div>
                            {chats.map(c => (
                                <div key={c.id} onClick={() => setActiveChat(c)} className={`p-4 hover:bg-[#232e3a] cursor-pointer flex items-center ${activeChat?.id === c.id ? 'bg-[#2b5278]' : ''}`}>
                                    <div className="w-10 h-10 rounded-full bg-gray-600 mr-3 flex items-center justify-center font-bold">{c.name[0]}</div>
                                    <span className="text-sm font-bold">{c.name}</span>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 text-xs text-gray-500 border-t border-gray-800">
                            Вы: @{user.username} 
                            <span className="ml-2 text-red-500 cursor-pointer" onClick={() => {localStorage.clear(); location.reload();}}>Выйти</span>
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 flex flex-col bg-[#0e1621]">
                        {activeChat ? (
                            <>
                                <div className="h-14 bg-[#17212b] flex items-center px-6 shadow-md">
                                    <div className="font-bold">{activeChat.name}</div>
                                </div>
                                <div className="flex-1 p-6 overflow-y-auto flex flex-col gap-2">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`p-3 max-w-xs text-sm ${m.sender === user.username ? 'message-out' : 'message-in'}`}>
                                            {m.text}
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 bg-[#17212b] flex items-center gap-4">
                                    <input 
                                        className="bg-transparent flex-1 outline-none text-sm" 
                                        placeholder="Написать..." 
                                        value={msg}
                                        onChange={e => setMsg(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && sendMessage()}
                                    />
                                    <button onClick={sendMessage} className="text-blue-400 font-bold uppercase text-xs">Отправить</button>
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 flex items-center justify-center text-gray-600">Выберите чат или найдите друга</div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

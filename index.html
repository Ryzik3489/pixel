<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel — Next Gen Ecosystem 2026</title>
    <!-- Подключаем инструменты -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Эффект жидкого стекла */
        .glass {
            background: rgba(23, 33, 43, 0.7);
            backdrop-filter: blur(15px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .message-in { background: #182533; border-radius: 18px 18px 18px 4px; }
        .message-out { background: #2b5278; border-radius: 18px 18px 4px 18px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2b5278; border-radius: 10px; }
        .video-circle { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #3390ec; overflow: hidden; }
    </style>
</head>
<body class="bg-[#0e1621] text-white font-sans antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeFolder, setActiveFolder] = useState('Все');
            const [isPremium, setIsPremium] = useState(true);
            const [stars, setStars] = useState(150);
            const [messages, setMessages] = useState([
                { id: 1, text: "Привет! Видел новые ИИ-фишки в Pixel?", type: "in", time: "12:01" },
                { id: 2, text: "Да, AI-пересказ — это просто пушка 🚀", type: "out", time: "12:05" }
            ]);
            const [inputValue, setInputValue] = useState('');

            const sendMessage = () => {
                if (!inputValue) return;
                setMessages([...messages, { id: Date.now(), text: inputValue, type: "out", time: "12:10" }]);
                setInputValue('');
            };

            return (
                <div className="flex h-screen w-full overflow-hidden">
                    
                    {/* --- ЛЕВАЯ ПАНЕЛЬ (КАНАЛЫ И ПАПКИ) --- */}
                    <div className="w-80 flex flex-col bg-[#17212b] border-r border-black/20">
                        {/* Header */}
                        <div className="p-4 flex items-center justify-between shadow-md">
                            <i className="fa-solid fa-bars text-gray-400 cursor-pointer"></i>
                            <div className="relative flex-1 px-4">
                                <input type="text" placeholder="Поиск" className="w-full bg-[#242f3d] rounded-lg py-1 px-3 text-sm focus:outline-none border border-transparent focus:border-blue-500" />
                            </div>
                        </div>

                        {/* Папки (Функция 2) */}
                        <div className="flex space-x-6 px-4 py-2 border-b border-gray-800 text-sm font-medium overflow-x-auto">
                            {['Все', 'Личные', 'Работа', 'Игры', 'AI'].map(folder => (
                                <button 
                                    key={folder}
                                    onClick={() => setActiveFolder(folder)}
                                    className={`pb-2 whitespace-nowrap ${activeFolder === folder ? 'text-blue-400 border-b-2 border-blue-400' : 'text-gray-400'}`}
                                >
                                    {folder}
                                </button>
                            ))}
                        </div>

                        {/* Список чатов */}
                        <div className="flex-1 overflow-y-auto">
                            <ChatItem name="Никита (Dev)" lastMsg="Скинь конфиг для ИИ..." time="12:45" active />
                            <ChatItem name="Pixel Global News" lastMsg="Новинка: Эффект Жидкого стекла!" time="10:20" isChannel />
                            <ChatItem name="Избранное" lastMsg="Файл: backup_2026.zip" time="Вчера" isSaved />
                            <ChatItem name="Crypto Bot" lastMsg="Курс Star: 1.2$" time="Пн" isBot />
                        </div>
                    </div>

                    {/* --- ПРАВАЯ ПАНЕЛЬ (ОКНО ЧАТА) --- */}
                    <div className="flex-1 flex flex-col bg-[url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')] bg-repeat">
                        
                        {/* Chat Header */}
                        <div className="glass h-16 flex items-center justify-between px-6 z-10">
                            <div className="flex items-center">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-orange-400 to-red-500 mr-3 flex items-center justify-center font-bold">Н</div>
                                <div>
                                    <div className="text-sm font-bold flex items-center">
                                        Никита (Dev) 
                                        {isPremium && <i className="fa-solid fa-star text-blue-400 text-[10px] ml-1"></i>}
                                    </div>
                                    <div className="text-xs text-blue-400">в сети</div>
                                </div>
                            </div>
                            <div className="flex items-center space-x-6 text-gray-400">
                                <div className="flex items-center bg-[#242f3d] px-3 py-1 rounded-full text-xs text-yellow-400 font-bold border border-yellow-500/30">
                                    <i className="fa-solid fa-star mr-1"></i> {stars}
                                </div>
                                <i className="fa-solid fa-phone cursor-pointer hover:text-white"></i>
                                <i className="fa-solid fa-magnifying-glass cursor-pointer hover:text-white"></i>
                                <i className="fa-solid fa-ellipsis-vertical cursor-pointer hover:text-white"></i>
                            </div>
                        </div>

                        {/* Messages Area */}
                        <div className="flex-1 overflow-y-auto p-6 space-y-4">
                            {/* Пример AI-пересказа (Функция 4) */}
                            <div className="flex justify-center">
                                <div className="glass px-4 py-2 rounded-2xl text-xs text-blue-200 border border-blue-500/20">
                                    <i className="fa-solid fa-robot mr-2"></i>
                                    AI-пересказ: Обсуждение новых функций экосистемы Pixel и внедрение валюты Stars.
                                </div>
                            </div>

                            {messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.type === 'out' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[70%] p-3 shadow-lg ${msg.type === 'out' ? 'message-out' : 'message-in'}`}>
                                        <div className="text-sm">{msg.text}</div>
                                        <div className="text-[10px] text-gray-400 text-right mt-1">{msg.time}</div>
                                    </div>
                                </div>
                            ))}

                            {/* Кружочек (Функция 1) */}
                            <div className="flex justify-end">
                                <div className="video-circle bg-gray-800 flex items-center justify-center border-4 border-blue-500">
                                    <i className="fa-solid fa-play text-2xl text-white"></i>
                                </div>
                            </div>
                        </div>

                        {/* Input Area */}
                        <div className="p-4 bg-transparent">
                            <div className="max-w-4xl mx-auto glass rounded-2xl p-2 flex items-center space-x-3 border border-white/5">
                                <button className="text-gray-400 hover:text-blue-400 px-2">
                                    <i className="fa-solid fa-paperclip text-xl"></i>
                                </button>
                                <input 
                                    type="text" 
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                    placeholder="Сообщение" 
                                    className="flex-1 bg-transparent border-none outline-none text-sm placeholder-gray-500"
                                />
                                <button className="text-gray-400 hover:text-blue-400 px-2">
                                    <i className="fa-solid fa-face-smile text-xl"></i>
                                </button>
                                <button 
                                    onClick={sendMessage}
                                    className="bg-blue-500 hover:bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center transition-transform active:scale-90"
                                >
                                    <i className="fa-solid fa-paper-plane text-white text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        /* Вспомогательный компонент для списка чатов */
        const ChatItem = ({ name, lastMsg, time, active = false, isChannel = false, isSaved = false, isBot = false }) => {
            let icon = <div className="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center font-bold text-lg">{name[0]}</div>;
            if (isSaved) icon = <div className="w-12 h-12 rounded-full bg-blue-500 flex items-center justify-center"><i className="fa-solid fa-bookmark text-white"></i></div>;
            if (isBot) icon = <div className="w-12 h-12 rounded-full bg-gray-700 flex items-center justify-center"><i className="fa-solid fa-robot text-white"></i></div>;

            return (
                <div className={`p-3 flex items-center cursor-pointer transition-colors ${active ? 'bg-[#2b5278]' : 'hover:bg-[#242f3d]'}`}>
                    <div className="relative">
                        {icon}
                        {!isChannel && <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#17212b] rounded-full"></div>}
                    </div>
                    <div className="ml-3 flex-1 overflow-hidden">
                        <div className="flex justify-between items-center">
                            <span className="text-sm font-semibold truncate">{name}</span>
                            <span className="text-[11px] text-gray-500">{time}</span>
                        </div>
                        <div className="text-xs text-gray-400 truncate mt-1">
                            {isBot && <span className="text-blue-400 mr-1 font-medium">bot:</span>}
                            {lastMsg}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

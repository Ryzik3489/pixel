<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL 1.0 PRO</title>
    <style>
        :root {
            --bg: #050505; --panel: #121212; --accent: #00ffa3; --text: #ffffff; --border: #222; --post-bg: #181818;
        }
        body.light-theme {
            --bg: #f0f2f5; --panel: #ffffff; --accent: #00b371; --text: #1c1e21; --border: #ddd; --post-bg: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        .container { display: flex; width: 100%; max-width: 1200px; gap: 15px; padding: 15px; height: 100%; }

        /* Sidebar - Компактный */
        .sidebar { width: 240px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .logo-box { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 15px; text-align: center; }
        .logo-box h1 { font-size: 18px; letter-spacing: 4px; color: var(--accent); }

        .nav-btn { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 15px; 
            padding: 12px 18px; cursor: pointer; font-weight: 600; display: flex; 
            justify-content: space-between; align-items: center; color: var(--text); font-size: 13px;
        }
        .nav-btn:hover, .nav-btn.active { border-color: var(--accent); background: rgba(0, 255, 163, 0.05); }

        /* Main Content */
        .main-content { 
            flex-grow: 1; background: var(--panel); border: 1px solid var(--border);
            border-radius: 25px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; 
        }

        /* Посты */
        .post { background: var(--post-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 10px; }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; }
        .hashtag { color: var(--accent); cursor: pointer; }
        .post-actions { display: flex; gap: 15px; margin-top: 15px; font-size: 13px; }
        .action-link { cursor: pointer; opacity: 0.7; }
        .action-link:hover { opacity: 1; color: var(--accent); }

        /* Окна разделов */
        .section { display: none; animation: fadeIn 0.2s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Инвентарь */
        .btn-inv { background: var(--accent) !important; color: #000 !important; justify-content: center !important; margin-top: auto; }

        /* Темы */
        .theme-toggle { margin-top: 10px; font-size: 11px; text-align: center; cursor: pointer; opacity: 0.5; }
    </style>
</head>
<body class="dark-theme">

    <div class="container">
        <aside class="sidebar">
            <div class="logo-box"><h1>PIXEL 1.0</h1></div>
            
            <button class="nav-btn active" onclick="showSec('posts')">ЛЕНТА <span>🏠</span></button>
            <button class="nav-btn" onclick="showSec('subs')">ПОДПИСКИ <span>👥</span></button>
            <button class="nav-btn" onclick="showSec('notif')">УВЕДОМЛЕНИЯ <span id="notif-count">0</span></button>
            <button class="nav-btn" onclick="showSec('search')">ПОИСК <span>🔍</span></button>
            <button class="nav-btn" onclick="showSec('settings')">НАСТРОЙКИ <span>⚙️</span></button>
            
            <a href="https://world-pixel-ten.vercel.app/" class="nav-btn btn-inv">ИНВЕНТАРЬ 📦</a>
            <div class="theme-toggle" onclick="toggleTheme()">СМЕНИТЬ ТЕМУ 🌓</div>
        </aside>

        <main class="main-content">
            <div id="sec-posts" class="section active">
                <div id="editor" style="display:none; margin-bottom:20px;">
                    <textarea id="p-text" placeholder="Что нового? (Используй #хештеги)" style="width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:10px;"></textarea>
                    <button onclick="sendPost()" style="background:var(--accent); border:none; padding:8px 20px; border-radius:10px; margin-top:5px; cursor:pointer;">Опубликовать</button>
                </div>
                <div id="feed">Загрузка...</div>
            </div>

            <div id="sec-search" class="section">
                <input type="text" oninput="doSearch(this.value)" placeholder="Поиск по хештегам или тексту..." style="width:100%; padding:15px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:15px;">
                <div id="search-results" style="margin-top:20px;"></div>
            </div>

            <div id="sec-notif" class="section">
                <h2>Уведомления</h2>
                <div id="notif-list" style="margin-top:20px; opacity:0.6;">У вас нет новых уведомлений</div>
            </div>

            <div id="sec-settings" class="section">
                <h2>Настройки</h2>
                <div style="margin-top:20px;">
                    <button class="nav-btn" onclick="openAuth()">АВТОРИЗАЦИЯ 👤</button>
                    <p style="margin-top:20px; font-size:12px; opacity:0.5;">PIXEL 1.0 PRO Build 2026</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;
        let postsData = [];

        // Переключение тем
        window.toggleTheme = () => document.body.classList.toggle('light-theme');

        // Навигация
        window.showSec = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        };

        // Хештеги
        const formatText = (text) => text.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');

        // Лайки
        window.like = async (id, likes) => {
            if(!user) return alert("Войди!");
            const ref = doc(db, "posts", id);
            await updateDoc(ref, { likes: likes.includes(user.uid) ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };

        // Жалобы на пользователя
        window.reportUser = async (uid) => {
            const reason = prompt("Причина жалобы на пользователя:");
            if(reason) {
                await addDoc(collection(db, "user_reports"), { target: uid, reason, reporter: user?.uid, date: new Date() });
                alert("Жалоба на пользователя отправлена");
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            document.getElementById('editor').style.display = u ? 'block' : 'none';
            initFeed();
        });

        function initFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
                postsData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(postsData, 'feed');
            });
        }

        function render(data, targetId) {
            const container = document.getElementById(targetId);
            container.innerHTML = "";
            data.forEach(p => {
                container.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <b onclick="reportUser('${p.authorId}')" style="cursor:help">@${p.authorName}</b>
                            <span>${p.createdAt ? 'Active' : '...'}</span>
                        </div>
                        <div class="post-content">${formatText(p.text)}</div>
                        <div class="post-actions">
                            <span class="action-link" onclick="like('${p.id}', ${JSON.stringify(p.likes || [])})">❤️ ${p.likes?.length || 0}</span>
                            <span class="action-link">💬 0</span>
                            <span class="action-link" onclick="alert('Репорт поста отправлен')">⚠️</span>
                        </div>
                    </div>`;
            });
        }

        window.sendPost = async () => {
            const text = document.getElementById('p-text').value;
            if(!text) return;
            await addDoc(collection(db, "posts"), {
                text, authorId: user.uid, authorName: user.displayName,
                likes: [], createdAt: serverTimestamp()
            });
            document.getElementById('p-text').value = "";
        };

        window.openAuth = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.doSearch = (val) => render(postsData.filter(p => p.text.toLowerCase().includes(val.toLowerCase())), 'search-results');

    </script>
</body>
</html>

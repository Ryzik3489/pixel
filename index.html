<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL v1.0 | Интерфейс</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* ОСНОВНЫЕ ПЕРЕМЕННЫЕ ЦВЕТОВ (Темная тема) */
        :root {
            --bg-color: #0b0b0d; /* Задний фон */
            --panel-color: #1c1c1e; /* Цвет панелей и кнопок */
            --text-color: #ffffff; /* Цвет текста */
            --accent-color: #007bff; /* Цвет активной кнопки и хештегов */
            --border-color: #2c2c2e; /* Цвет границ */
            --gray-text: #8e8e93; /* Серый текст */
        }

        /* ОБЩИЕ СТИЛИ */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; overflow: hidden; }

        /* МЕНЮ СЛЕВА (из твоих скриншотов) */
        .sidebar {
            width: 260px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid var(--border-color);
            background-color: #111113;
        }

        .logo { font-size: 20px; font-weight: bold; margin-bottom: 30px; padding-left: 15px; cursor: default; }

        /* СТИЛЬ КНОПОК МЕНЮ */
        .nav-btn {
            display: flex; align-items: center; gap: 15px;
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--gray-text);
            transition: all 0.2s ease;
            text-decoration: none;
            background: none; border: none; width: 100%; text-align: left; font-size: 16px;
        }

        .nav-btn:hover { background-color: rgba(255,255,255,0.05); color: var(--text-color); }
        .nav-btn.active { background-color: var(--panel-color); color: var(--text-color); font-weight: 600; }
        .nav-btn i { font-size: 18px; }

        /* КОНТЕНТНАЯ ОБЛАСТЬ (Справа) */
        .main-content {
            flex-grow: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Прокрутка только для постов */
            scrollbar-width: thin; scrollbar-color: var(--border-color) transparent;
        }

        /* СЕКЦИИ КОНТЕНТА (прячем все, кроме активной) */
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* СТИЛЬ РЕДАКТОРА ПОСТА (Сверху) */
        .post-editor {
            background-color: var(--panel-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        textarea {
            width: 100%;
            background: none; border: none; color: white;
            outline: none; resize: none;
            font-size: 16px; min-height: 50px; margin-bottom: 15px;
        }

        .btn-pub {
            background-color: #d1d1d6;
            color: black;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            transition: 0.2s;
        }
        .btn-pub:hover { background-color: #fff; }

        /* СТИЛЬ КАРТОЧКИ ПОСТА */
        .post-card {
            background-color: var(--panel-color);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        .post-text { font-size: 16px; line-height: 1.4; }
        .hashtag { color: var(--accent-color); } /* Подсветка хештегов */

        /* Кнопки действий (Лайки, Просмотры) */
        .post-actions {
            display: flex;
            gap: 25px;
            margin-top: 15px;
            color: var(--gray-text);
            font-size: 14px;
        }
        .action { cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .action:hover { color: var(--text-color); }
        .action.liked { color: #ff3b30; } /* Красный для лайков */

        /* СТИЛЬ ПОИСКОВОЙ СТРОКИ */
        .search-bar {
            width: 100%;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">Pixel</div>
        <button class="nav-btn active" id="btn-posts" onclick="navigateTo('posts')"><i class="bi bi-house-door-fill"></i> посты</button>
        <button class="nav-btn" id="btn-search" onclick="navigateTo('search')"><i class="bi bi-search"></i> поиск</button>
        <button class="nav-btn" id="btn-profile" onclick="navigateTo('profile')"><i class="bi bi-person"></i> профиль</button>
    </aside>

    <main class="main-content">

        <div id="sec-posts" class="content-section active">
            <div class="post-editor">
                <textarea id="new-post-text" placeholder="Что нового? (можно #хештег)"></textarea>
                <button class="btn-pub" onclick="sendNewPost()">Опубликовать</button>
            </div>
            
            <div id="feed-items"></div>
        </div>

        <div id="sec-search" class="content-section">
            <input type="text" class="search-bar" placeholder="Поиск по хештегам (#программирование)..." oninput="doSearch(this.value)">
            <div id="search-results"></div>
        </div>

        <div id="sec-profile" class="content-section">
            <h2>Ваши посты</h2>
            <div id="profile-posts"></div>
        </div>
        
    </main>

    <script type="module">
        // 1. Инициализация Firebase (твоя старая база данных)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Храним ID "автора" (в реальности здесь должен быть Firebase Auth)
        const currentUserId = "dev_author_1";

        // 2. Функция публикации нового поста
        window.sendNewPost = async () => {
            const text = document.getElementById('new-post-text').value;
            if(!text.trim()) return; // Не постим пустое
            await addDoc(collection(db, "posts"), { text: text, authorId: currentUserId, likes: [], views: 0, time: serverTimestamp() });
            document.getElementById('new-post-text').value = ""; // Очищаем поле
        };

        // 3. Функция рендеринга постов в HTML
        function renderPosts(postsData, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = ""; // Очищаем старое
            
            postsData.forEach(post => {
                const isLiked = post.likes?.includes(currentUserId);
                // Функция авто-подсветки хештегов
                const linkedText = post.text.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');

                container.innerHTML += `
                    <div class="post-card">
                        <div class="post-text">${linkedText}</div>
                        <div class="post-actions">
                            <div class="action ${isLiked?'liked':''}" onclick="toggleLike('${post.id}', ${JSON.stringify(post.likes)})"><i class="bi ${isLiked?'bi-heart-fill':'bi-heart'}"></i> ${post.likes?.length || 0}</div>
                            <div class="action"><i class="bi bi-bar-chart"></i> ${post.views || 0} просмотров</div>
                        </div>
                    </div>`;
            });
        }

        // 4. Лайки
        window.toggleLike = async (postId, likesArray) => {
            const ref = doc(db, "posts", postId);
            await updateDoc(ref, { likes: likesArray.includes(currentUserId) ? arrayRemove(currentUserId) : arrayUnion(currentUserId) });
        };

        // 5. Поиск по тексту/хештегам
        let allPosts = [];
        window.doSearch = (queryText) => {
            const filtered = allPosts.filter(p => p.text.toLowerCase().includes(queryText.toLowerCase()));
            renderPosts(filtered, 'search-results');
        };

        // 6. Подгрузка данных в реальном времени (самое важное)
        onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
            allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderPosts(allPosts, 'feed-items'); // Обновляем ленту
        });
    </script>

    <script>
        // Простой скрипт навигации (не Firebase)
        function navigateTo(targetId) {
            // Прячем все секции
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            // Показываем нужную
            document.getElementById('sec-'+targetId).classList.add('active');
            // Обновляем состояние кнопок
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+targetId).classList.add('active');
        }
    </script>
</body>
</html>

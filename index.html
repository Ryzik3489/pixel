<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel — Full Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0e1621; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .tg-input { background: #17212b; border: 1px solid #242f3d; padding: 12px; border-radius: 10px; width: 100%; outline: none; color: white; }
        .btn-blue { background: #3390ec; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; cursor: pointer; border: none; color: white; transition: 0.2s; }
        .btn-blue:hover { background: #2b7ecb; }
        .sidebar { background: #17212b; width: 320px; border-right: 1px solid #080d14; }
        .chat-bg { background: #0e1621; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-opacity: 0.1; }
        .message-out { background: #2b5278; border-radius: 15px 15px 2px 15px; padding: 8px 12px; max-width: 80%; align-self: flex-end; }
        .message-in { background: #182533; border-radius: 15px 15px 15px 2px; padding: 8px 12px; max-width: 80%; align-self: flex-start; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BOT_TOKEN = "8780477035:AAH4_DeKaAfyRGScU7eSPpRjBpmJlv5ORTU";
        // ID твоего чата (чтобы бот знал куда слать код)
        const MY_CHAT_ID = "ТВОЙ_CHAT_ID"; 

        const App = () => {
            const [view, setView] = useState('auth'); 
            const [activeChat, setActiveChat] = useState(0);
            const [phone, setPhone] = useState('+7');
            const [myProfile, setMyProfile] = useState({ name: 'Илья', username: 'ilya_dev', bio: 'Work hard' });

            // Список чатов (Группы, Каналы, Люди)
            const [chats] = useState([
                { id: 0, name: "Избранное", status: "облако", type: "saved", lastMsg: "Файлы здесь" },
                { id: 1, name: "Артем", status: "в сети", type: "user", lastMsg: "Привет, как проект?" },
                { id: 2, name: "Дизайн Группа", status: "245 участников", type: "group", lastMsg: "Макет готов" },
                { id: 3, name: "Новости IT", status: "1.2k подписчиков", type: "channel", lastMsg: "Вышел новый ИИ" }
            ]);

            const handleLogin = async () => {
                const code = Math.floor(1000 + Math.random() * 9000);
                // Бот отправит код сразу, если ты хоть раз ему писал
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${MY_CHAT_ID}&text=Твой проверочный код: ${code}`);
                const input = prompt("Введите код из Telegram:");
                if(input) setView('main');
            };

            if (view === 'auth') return (
                <div className="flex flex-col items-center justify-center h-screen max-w-xs mx-auto text-center">
                    <h1 className="text-3xl font-bold mb-8">Pixel</h1>
                    <input className="tg-input mb-4" value={phone} onChange={e => setPhone(e.target.value)} placeholder="Номер телефона" />
                    <button onClick={handleLogin} className="btn-blue uppercase">Войти</button>
                </div>
            );

            return (
                <div className="flex h-screen w-full">
                    {/* Боковая панель */}
                    <div className="sidebar flex flex-col">
                        <div className="p-4 flex items-center space-x-3">
                            <i className="fa-solid fa-bars text-gray-500 cursor-pointer" onClick={() => setView('settings')}></i>
                            <input className="bg-[#242f3d] rounded-full px-4 py-1.5 text-sm w-full outline-none" placeholder="Поиск" />
                        </div>
                        
                        {/* Список папок (условно вкладки) */}
                        <div className="flex justify-around text-[11px] font-bold text-gray-500 border-b border-gray-800 pb-2">
                            <span className="text-blue-400 border-b-2 border-blue-400 pb-1 px-2">Все</span>
                            <span>Личные</span>
                            <span>Группы</span>
                            <span>Каналы</span>
                        </div>

                        <div className="flex-1 overflow-y-auto">
                            {chats.map(chat => (
                                <div 
                                    key={chat.id} 
                                    onClick={() => setActiveChat(chat.id)}
                                    className={`p-3 flex items-center cursor-pointer transition ${activeChat === chat.id ? 'bg-[#2b5278]' : 'hover:bg-[#232e3a]'}`}
                                >
                                    <div className="w-12 h-12 rounded-full bg-blue-500 mr-3 flex items-center justify-center font-bold">
                                        {chat.type === 'saved' ? <i className="fa-solid fa-bookmark"></i> : chat.name[0]}
                                    </div>
                                    <div className="flex-1 overflow-hidden">
                                        <div className="flex justify-between"><span className="text-sm font-bold">{chat.name}</span><span className="text-[10px] text-gray-500">12:00</span></div>
                                        <div className="text-xs text-gray-400 truncate">{chat.lastMsg}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Окно чата */}
                    <div className="flex-1 flex flex-col chat-bg">
                        {/* Header */}
                        <div className="h-14 bg-[#17212b] flex items-center justify-between px-4 border-l border-black/20">
                            <div className="flex items-center cursor-pointer">
                                <div className="w-10 h-10 rounded-full bg-gray-700 mr-3 flex items-center justify-center text-sm">{chats[activeChat].name[0]}</div>
                                <div>
                                    <div className="text-sm font-bold">{chats[activeChat].name}</div>
                                    <div className="text-[11px] text-blue-400">{chats[activeChat].status}</div>
                                </div>
                            </div>
                            <div className="flex space-x-5 text-gray-400">
                                <i className="fa-solid fa-magnifying-glass"></i>
                                <i className="fa-solid fa-ellipsis-vertical"></i>
                            </div>
                        </div>

                        {/* Сообщения */}
                        <div className="flex-1 p-4 overflow-y-auto flex flex-col space-y-2">
                            <div className="message-in text-sm text-white">Привет! Как дела с разработкой мессенджера?</div>
                            <div className="message-out text-sm text-white">Всё отлично, убрал всё лишнее, добавил папки и группы.</div>
                        </div>

                        {/* Ввод */}
                        <div className="p-3 bg-[#17212b] flex items-center space-x-3">
                            <label className="text-gray-400 hover:text-white cursor-pointer"><i className="fa-solid fa-paperclip text-xl"></i><input type="file" className="hidden" /></label>
                            <input className="bg-transparent flex-1 outline-none text-sm" placeholder="Написать сообщение..." />
                            <i className="fa-solid fa-microphone text-gray-400 text-xl"></i>
                            <button className="text-blue-400 font-bold px-2">ОТПРАВИТЬ</button>
                        </div>
                    </div>

                    {/* Настройки (скрытое окно) */}
                    {view === 'settings' && (
                        <div className="absolute inset-0 bg-black/50 flex justify-start z-50">
                            <div className="w-80 bg-[#17212b] h-full p-6 shadow-2xl">
                                <div className="flex items-center justify-between mb-8">
                                    <h2 className="text-xl font-bold">Настройки</h2>
                                    <i className="fa-solid fa-xmark cursor-pointer" onClick={() => setView('main')}></i>
                                </div>
                                <div className="flex flex-col items-center mb-6">
                                    <div className="w-20 h-20 bg-blue-600 rounded-full mb-4 flex items-center justify-center text-2xl font-bold">{myProfile.name[0]}</div>
                                    <div className="font-bold">{myProfile.name}</div>
                                    <div className="text-sm text-gray-400">@{myProfile.username}</div>
                                </div>
                                <div className="space-y-4">
                                    <div className="bg-[#242f3d] p-3 rounded-lg text-sm">Конфиденциальность</div>
                                    <div className="bg-[#242f3d] p-3 rounded-lg text-sm">Данные и память</div>
                                    <div className="bg-[#242f3d] p-3 rounded-lg text-sm">Папки с чатами</div>
                                    <button onClick={() => setView('auth')} className="text-red-400 text-sm mt-4">Выйти из аккаунта</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

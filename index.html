<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL 1.0</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #121212;
            --accent: #00ffa3;
            --text: #ffffff;
            --gray: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        .container { display: flex; width: 100%; max-width: 1400px; gap: 20px; padding: 20px; height: 100%; }

        /* Sidebar */
        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .logo-box { 
            background: linear-gradient(45deg, #111, #222);
            border: 1px solid #333;
            border-radius: 25px; 
            padding: 30px; 
            text-align: center; 
        }
        .logo-box h1 { font-size: 24px; letter-spacing: 8px; font-weight: 900; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .version { font-size: 10px; opacity: 0.5; letter-spacing: 2px; margin-top: 5px; }

        .nav-btn { 
            background: var(--panel); 
            border: 1px solid #222; 
            border-radius: 20px; 
            padding: 18px 25px; 
            cursor: pointer; 
            font-weight: 600; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: var(--text);
            transition: 0.3s;
        }
        .nav-btn:hover { background: #1a1a1a; border-color: var(--accent); }
        .nav-btn.active { border-color: var(--accent); background: rgba(0, 255, 163, 0.05); }

        .btn-inventory { 
            margin-top: auto; 
            background: var(--accent); 
            color: black; 
            justify-content: center; 
            gap: 10px; 
            text-decoration: none; 
            border: none;
        }

        /* Main Content */
        .main-content { 
            flex-grow: 1; 
            background: var(--panel); 
            border: 1px solid #222;
            border-radius: 40px; 
            padding: 30px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }

        /* Search Section */
        .search-container { position: sticky; top: 0; background: var(--panel); z-index: 10; padding-bottom: 15px; }
        .search-input { 
            width: 100%; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 18px; 
            border-radius: 20px; 
            color: white; 
            font-size: 16px;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }

        /* Create Post */
        .create-post { background: #1a1a1a; padding: 20px; border-radius: 25px; border: 1px solid #333; }
        textarea { width: 100%; background: transparent; border: none; color: white; resize: none; outline: none; font-size: 16px; }
        .post-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .publish-btn { background: var(--accent); color: black; border: none; padding: 10px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Feed */
        .post { background: #181818; border-radius: 25px; padding: 25px; border: 1px solid #222; }
        .post-user { color: var(--accent); font-weight: bold; margin-bottom: 10px; display: block; }
        .post-img { width: 100%; border-radius: 20px; margin-top: 15px; border: 1px solid #333; }
        
        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #111; padding: 40px; border-radius: 35px; width: 380px; text-align: center; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <div class="logo-box">
                <h1>PIXEL</h1>
                <div class="version">VERSION 1.0</div>
            </div>
            
            <button id="login-trigger" class="nav-btn" onclick="openModal()">ВХОД <span>👤</span></button>
            <div id="user-badge" style="display:none; padding: 10px; text-align: center; border: 1px dashed var(--accent); border-radius: 15px;">
                <span id="user-name"></span>
                <button onclick="logout()" style="display:block; margin: 5px auto; color: red; background:none; border:none; cursor:pointer;">Выйти</button>
            </div>

            <button class="nav-btn active" id="btn-posts" onclick="switchTab('posts')">ПОСТЫ <span>🏠</span></button>
            <button class="nav-btn" id="btn-search" onclick="switchTab('search')">ПОИСК <span>🔍</span></button>
            
            <a href="https://world-pixel-ten.vercel.app/" class="nav-btn btn-inventory">ИНВЕНТ</a>
        </aside>

        <main class="main-content">
            <div id="search-area" class="search-container" style="display:none;">
                <input type="text" id="search-query" class="search-input" placeholder="Поиск по тексту поста..." oninput="handleSearch()">
            </div>

            <div id="editor" class="create-post" style="display:none;">
                <textarea id="p-text" placeholder="Что нового в PIXEL 1.0?" rows="3"></textarea>
                <input type="text" id="p-img" placeholder="Ссылка на фото (необязательно)" style="width:100%; background:none; border:none; color: #888; margin-top:10px;">
                <div class="post-tools">
                    <span style="font-size: 12px; color: #666;">PIXEL COMMUNITY</span>
                    <button class="publish-btn" onclick="sendPost()">ОПУБЛИКОВАТЬ</button>
                </div>
            </div>

            <div id="feed">Загрузка контента...</div>
        </main>
    </div>

    <div class="modal" id="authModal">
        <div class="modal-box">
            <h2 style="margin-bottom: 20px;">АВТОРИЗАЦИЯ</h2>
            <button class="nav-btn" style="width:100%; margin-bottom:10px; justify-content:center;" onclick="login('google')">GOOGLE</button>
            <button class="nav-btn" style="width:100%; justify-content:center;" onclick="login('github')">GITHUB</button>
            <p onclick="closeModal()" style="margin-top:20px; cursor:pointer; opacity: 0.5;">Закрыть</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, GithubAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU",
            authDomain: "pixel-7c9f0.firebaseapp.com",
            projectId: "pixel-7c9f0",
            storageBucket: "pixel-7c9f0.firebasestorage.app",
            messagingSenderId: "1016081455742",
            appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let allPosts = [];

        // --- Переключение Табов ---
        window.switchTab = (tab) => {
            document.getElementById('search-area').style.display = tab === 'search' ? 'block' : 'none';
            document.getElementById('btn-posts').classList.toggle('active', tab === 'posts');
            document.getElementById('btn-search').classList.toggle('active', tab === 'search');
            if(tab === 'posts') renderPosts(allPosts);
        };

        // --- Поиск ---
        window.handleSearch = () => {
            const val = document.getElementById('search-query').value.toLowerCase();
            const filtered = allPosts.filter(p => p.text.toLowerCase().includes(val));
            renderPosts(filtered);
        };

        // --- Auth ---
        window.openModal = () => document.getElementById('authModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('authModal').style.display = 'none';
        window.login = async (m) => {
            const p = m === 'google' ? new GoogleAuthProvider() : new GithubAuthProvider();
            await signInWithPopup(auth, p);
            closeModal();
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (u) => {
            user = u;
            document.getElementById('login-trigger').style.display = u ? 'none' : 'flex';
            document.getElementById('user-badge').style.display = u ? 'block' : 'none';
            document.getElementById('editor').style.display = u ? 'block' : 'none';
            if(u) document.getElementById('user-name').innerText = u.displayName;
            initFeed();
        });

        // --- База данных ---
        function initFeed() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderPosts(allPosts);
            });
        }

        function renderPosts(data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            data.forEach(p => {
                feed.innerHTML += `
                    <div class="post">
                        <span class="post-user">@${p.authorName}</span>
                        <div>${p.text}</div>
                        ${p.imageUrl ? `<img src="${p.imageUrl}" class="post-img">` : ''}
                    </div>`;
            });
        }

        window.sendPost = async () => {
            const txt = document.getElementById('p-text').value;
            const img = document.getElementById('p-img').value;
            if(!txt.trim()) return;
            await addDoc(collection(db, "posts"), {
                text: txt, imageUrl: img,
                authorId: user.uid, authorName: user.displayName,
                createdAt: serverTimestamp()
            });
            document.getElementById('p-text').value = "";
            document.getElementById('p-img').value = "";
        };
    </script>
</body>
</html>

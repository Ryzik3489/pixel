<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL | Modern Social</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #0b0b0d; --panel: #1c1c1e; --accent: #007bff; --text: #ffffff; --gray: #8e8e93; --border: #2c2c2e; --danger: #ff453a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* ОКНО ВХОДА */
        #auth-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .auth-card {
            background: var(--panel); border: 1px solid var(--border);
            padding: 40px; border-radius: 30px; text-align: center;
            width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .auth-logo { font-size: 40px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; }
        .auth-btn {
            background: white; color: black; border: none; width: 100%;
            padding: 15px; border-radius: 15px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; margin-top: 25px; transition: 0.2s;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        .sidebar { width: 260px; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .nav-btn { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: var(--gray); transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }
        
        .main-content { flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .section { display: none; max-width: 650px; margin: 0 auto; padding: 20px; }
        .section.active { display: block; }

        .post { background: var(--panel); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .post img { width: 100%; border-radius: 15px; margin-top: 12px; }
        
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo">PIXEL</div>
            <p style="color: var(--gray);">Добро пожаловать в ИТД v1.1</p>
            <button class="auth-btn" onclick="login()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Reference_Icon.svg" width="20">
                Войти через Google
            </button>
            <p style="margin-top: 20px; font-size: 12px; color: #555;">При входе вы соглашаетесь с правилами сети</p>
        </div>
    </div>

    <aside class="sidebar">
        <div style="font-size: 20px; font-weight: 800; margin-bottom: 25px; padding-left: 15px;">ИТД</div>
        <div class="nav-btn active" onclick="nav('feed', this)"><i class="bi bi-house"></i> Лента</div>
        <div class="nav-btn" onclick="nav('notif', this)"><i class="bi bi-bell"></i> Уведомления</div>
        <div class="nav-btn" onclick="nav('profile', this)"><i class="bi bi-person"></i> Профиль</div>
        <div class="nav-btn" style="margin-top:auto; color:var(--danger);" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Выход</div>
    </aside>

    <main class="main-content">
        <div id="sec-feed" class="section active">
            <div style="background:var(--panel); padding:20px; border-radius:25px; margin-bottom:20px;">
                <textarea id="post-text" placeholder="Что нового?" style="width:100%; background:none; border:none; color:white; outline:none; resize:none; font-size:18px; min-height:60px;"></textarea>
                <div style="display:flex; justify-content:flex-end; margin-top:10px;">
                    <button onclick="sendPost()" style="background:#fff; color:#000; border:none; padding:10px 25px; border-radius:20px; font-weight:bold; cursor:pointer;">Опубликовать</button>
                </div>
            </div>
            <div id="feed-items"></div>
        </div>
        </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;

        // Вход
        window.login = () => {
            signInWithPopup(auth, new GoogleAuthProvider())
                .then(() => console.log("Успешный вход"))
                .catch(err => alert("Ошибка входа: " + err.message));
        };

        // Следим за состоянием
        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('auth-overlay').classList.add('hidden'); // Прячем окно
                initFeed();
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden'); // Показываем окно
            }
        });

        window.logout = () => signOut(auth);

        // Навигация
        window.nav = (id, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
            btn.classList.add('active');
        };

        function initFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                const cont = document.getElementById('feed-items');
                cont.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    cont.innerHTML += `
                        <div class="post">
                            <div style="display:flex; gap:10px; align-items:center; margin-bottom:12px;">
                                <div style="width:35px; height:35px; border-radius:50%; background:url(${p.av}); background-size:cover;"></div>
                                <b>${p.author}</b>
                            </div>
                            <div>${p.text}</div>
                        </div>`;
                });
            });
        }

        window.sendPost = async () => {
            const t = document.getElementById('post-text').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), {
                text: t, author: user.displayName, av: user.photoURL, uid: user.uid,
                time: serverTimestamp()
            });
            document.getElementById('post-text').value = "";
        };
    </script>
</body>
</html>

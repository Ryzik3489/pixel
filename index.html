<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #0b0b0d; --panel: #1c1c1e; --accent: #007bff; --text: #ffffff; --gray: #8e8e93; --border: #2c2c2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 25px; padding-left: 15px; }
        .nav-btn { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: var(--gray); transition: 0.2s; position: relative; }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }
        .badge { position: absolute; right: 15px; background: #ff453a; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; display: none; }
        .main-content { flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .section { display: none; max-width: 600px; margin: 0 auto; padding: 20px; }
        .section.active { display: block; }
        .post { background: var(--panel); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .post img { width: 100%; border-radius: 15px; margin-top: 12px; }
        .editor { background: var(--panel); border-radius: 25px; padding: 25px; margin-bottom: 20px; }
        textarea { width: 100%; background: none; border: none; color: white; outline: none; resize: none; font-size: 18px; min-height: 50px; }
        #img-preview { width: 100%; border-radius: 15px; margin-top: 10px; display: none; }
        .btn-pub { background: #d1d1d6; color: black; border: none; padding: 10px 28px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">Pixel <span>v1.1 beta</span></div>
        <div class="nav-btn active" onclick="nav('feed', this)"><i class="bi bi-house-door-fill"></i> Лента</div>
        <div class="nav-btn" onclick="nav('search', this)"><i class="bi bi-search"></i> Поиск</div>
        <div class="nav-btn" onclick="nav('notif', this)"><i class="bi bi-bell"></i> Уведомления <span id="notif-badge" class="badge">0</span></div>
        <div class="nav-btn" onclick="nav('profile', this)"><i class="bi bi-person"></i> Профиль</div>
        <div class="nav-btn" style="margin-top:auto; color:#ff453a;" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Выйти</div>
    </aside>

    <main class="main-content">
        <div id="sec-feed" class="section active">
            <div class="editor">
                <textarea id="post-text" placeholder="Что нового?"></textarea>
                <img id="img-preview">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                    <label style="cursor:pointer; color:var(--gray); font-size:20px;"><i class="bi bi-paperclip"></i><input type="file" id="post-img" hidden onchange="previewImg(this)"></label>
                    <button class="btn-pub" onclick="sendPost()">Опубликовать</button>
                </div>
            </div>
            <div id="feed-items"></div>
        </div>
        <div id="sec-search" class="section"><input type="text" oninput="doSearch(this.value)" placeholder="Поиск..."><div id="search-items"></div></div>
        <div id="sec-notif" class="section"><h2>Уведомления</h2><div id="notif-items"></div></div>
        <div id="sec-profile" class="section"><div id="profile-header" style="text-align:center; padding:20px;"></div><div id="profile-items"></div></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, arrayRemove, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, currentImg = "", allPosts = [];

        onAuthStateChanged(auth, u => { if(u) { user = u; init(); } else { signInWithPopup(auth, new GoogleAuthProvider()); } });
        window.logout = () => signOut(auth).then(() => location.reload());

        window.nav = (id, btn) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
            if(btn) btn.classList.add('active');
            if(id === 'profile') renderPosts(allPosts.filter(p => p.uid === user.uid), 'profile-items');
            if(id === 'notif') document.getElementById('notif-badge').style.display = 'none';
        };

        window.previewImg = (i) => {
            const r = new FileReader();
            r.onload = e => { currentImg = e.target.result; document.getElementById('img-preview').src = currentImg; document.getElementById('img-preview').style.display = 'block'; };
            r.readAsDataURL(i.files[0]);
        };

        function init() {
            document.getElementById('profile-header').innerHTML = `<div style="width:90px; height:90px; border-radius:50%; background:url(${user.photoURL}); background-size:cover; margin:0 auto 10px; border:2px solid #333;"></div><h2>${user.displayName}</h2>`;
            
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), snap => {
                allPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderPosts(allPosts, 'feed-items');
            });

            onSnapshot(query(collection(db, "notifs"), where("to", "==", user.uid), orderBy("time", "desc")), snap => {
                const nCont = document.getElementById('notif-items'); nCont.innerHTML = "";
                if(snap.size > 0 && !document.getElementById('sec-notif').classList.contains('active')) {
                    document.getElementById('notif-badge').innerText = snap.size;
                    document.getElementById('notif-badge').style.display = 'block';
                }
                snap.forEach(d => {
                    const data = d.data();
                    nCont.innerHTML += `<div style="background:#1c1c1e; padding:15px; border-radius:15px; margin-bottom:10px;"><b>${data.fromName}</b> лайкнул ваш пост</div>`;
                });
            });
        }

        function renderPosts(data, targetId) {
            const container = document.getElementById(targetId);
            container.innerHTML = "";
            data.forEach(p => {
                const isLiked = p.likes?.includes(user.uid);
                container.innerHTML += `
                    <div class="post">
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                            <div style="display:flex; gap:10px; align-items:center;">
                                <div style="width:30px; height:30px; border-radius:50%; background:url(${p.av}); background-size:cover;"></div>
                                <b>${p.author}</b>
                            </div>
                            ${p.uid === user.uid ? `<i class="bi bi-trash" onclick="deletePost('${p.id}')"></i>` : ''}
                        </div>
                        <div style="margin-bottom:10px;">${p.text}</div>
                        ${p.img ? `<img src="${p.img}">` : ''}
                        <div style="display:flex; gap:25px; margin-top:15px; color:#8e8e93;">
                            <span style="cursor:pointer" onclick="toggleLike('${p.id}')">
                                <i class="bi ${isLiked?'bi-heart-fill':'bi-heart'}" style="${isLiked?'color:#ff2d55':''}"></i> ${p.likes?.length || 0}
                            </span>
                            <span><i class="bi bi-graph-up"></i> ${p.viewers?.length || 0}</span>
                        </div>
                    </div>`;
                if(!p.viewers?.includes(user.uid)) updateDoc(doc(db, "posts", p.id), { viewers: arrayUnion(user.uid) });
            });
        }

        window.toggleLike = async (postId) => {
            const post = allPosts.find(p => p.id === postId);
            const isLiked = post.likes?.includes(user.uid);
            const postRef = doc(db, "posts", postId);
            
            await updateDoc(postRef, { likes: isLiked ? arrayRemove(user.uid) : arrayUnion(user.uid) });
            
            if(!isLiked && post.uid !== user.uid) {
                await addDoc(collection(db, "notifs"), { to: post.uid, fromName: user.displayName, time: serverTimestamp() });
            }
        };

        window.sendPost = async () => {
            const t = document.getElementById('post-text').value;
            if(!t && !currentImg) return;
            await addDoc(collection(db, "posts"), { text: t, img: currentImg, author: user.displayName, av: user.photoURL, uid: user.uid, likes: [], viewers: [user.uid], time: serverTimestamp() });
            document.getElementById('post-text').value = ""; document.getElementById('img-preview').style.display = 'none'; currentImg = "";
        };

        window.deletePost = async id => { if(confirm("Удалить?")) await deleteDoc(doc(db, "posts", id)); };
        window.doSearch = (v) => renderPosts(allPosts.filter(p => p.text.toLowerCase().includes(v.toLowerCase())), 'search-items');
    </script>
</body>
</html>

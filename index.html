<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PIXEL v1.4 Final</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --bg: #0b0b0d; --panel: #1c1c1e; --accent: #007bff; --text: #ffffff; --gray: #8e8e93; --border: #2c2c2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 30px; padding-left: 15px; letter-spacing: 2px; }
        .nav-btn { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: var(--gray); transition: 0.2s; text-decoration: none; }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }
        
        /* Main */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .tabs { display: flex; justify-content: center; gap: 40px; padding: 20px; border-bottom: 1px solid var(--border); }
        .tab { color: var(--gray); cursor: pointer; font-size: 14px; transition: 0.3s; }
        .tab.active { color: var(--text); border-bottom: 2px solid var(--text); padding-bottom: 5px; }

        .section { display: none; height: 100%; overflow-y: auto; scrollbar-width: none; padding-bottom: 80px; }
        .section.active { display: block; }

        /* Posts */
        .post { background: var(--panel); width: 100%; max-width: 600px; border-radius: 20px; padding: 20px; margin: 15px auto; border: 1px solid transparent; transition: 0.3s; }
        .post:hover { border-color: #333; }
        .hashtag { color: var(--accent); cursor: pointer; font-weight: 500; }
        .post-actions { display: flex; gap: 25px; margin-top: 15px; color: var(--gray); font-size: 14px; }
        .action { cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .action:hover { color: var(--text); }

        /* Inputs */
        .editor { background: var(--panel); max-width: 600px; margin: 20px auto; border-radius: 20px; padding: 20px; }
        textarea { width: 100%; background: none; border: none; color: white; outline: none; resize: none; font-size: 16px; min-height: 60px; }
        .search-bar { width: 100%; max-width: 600px; margin: 20px auto; display: block; background: var(--panel); border: 1px solid var(--border); padding: 12px 20px; border-radius: 30px; color: white; outline: none; }
        
        .btn-pub { background: white; color: black; border: none; padding: 8px 22px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-pub:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">PIXEL <span>v1.4</span></div>
        <div class="nav-btn active" onclick="nav('feed', this)"><i class="bi bi-house-door-fill"></i> Лента</div>
        <div class="nav-btn" onclick="nav('search', this)"><i class="bi bi-search"></i> Поиск</div>
        <div class="nav-btn" onclick="nav('notif', this)"><i class="bi bi-bell"></i> Уведомления</div>
        <div class="nav-btn" onclick="nav('profile', this)"><i class="bi bi-person"></i> Профиль</div>
        
        <div class="nav-btn" style="margin-top:auto; color:#ff453a;" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Выйти
        </div>
    </aside>

    <main class="main-content">
        <div class="tabs">
            <div class="tab active">Для вас</div>
            <div class="tab">Подписки</div>
        </div>

        <div id="sec-feed" class="section active">
            <div class="editor">
                <textarea id="post-text" placeholder="Что нового? #pixel"></textarea>
                <div id="poll-ui" style="display:none; margin-top:10px; border-top: 1px solid #333; padding-top:10px;">
                    <input type="text" id="p-q" placeholder="Ваш вопрос" style="width:100%; background:#0b0b0d; border:1px solid #333; color:white; padding:8px; border-radius:8px; margin-bottom:5px;">
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                    <div style="display:flex; gap:20px; color:var(--gray); font-size:20px;">
                        <i class="bi bi-bar-chart action" onclick="document.getElementById('poll-ui').style.display='block'"></i>
                        <i class="bi bi-emoji-smile action"></i>
                    </div>
                    <button class="btn-pub" onclick="sendPost()">Опубликовать</button>
                </div>
            </div>
            <div id="feed-items"></div>
        </div>

        <div id="sec-search" class="section">
            <input type="text" class="search-bar" oninput="doSearch(this.value)" placeholder="Поиск постов или #хештегов">
            <div id="search-results"></div>
        </div>

        <div id="sec-notif" class="section">
            <h3 style="padding:20px;">Уведомления</h3>
            <div id="notif-list"></div>
        </div>

        <div id="sec-profile" class="section">
            <div style="text-align:center; padding:40px;">
                <div id="my-av" style="width:100px; height:100px; border-radius:50%; background-size:cover; margin:0 auto 15px; border:3px solid var(--panel);"></div>
                <h2 id="my-name">...</h2>
                <div style="display:flex; justify-content:center; gap:20px; margin-top:15px; color:var(--gray);">
                    <span><b>0</b> Подписчиков</span>
                    <span><b>0</b> Подписок</span>
                </div>
                <hr style="border:0; border-top:1px solid var(--border); margin:30px 0;">
                <h3 style="text-align:left; max-width:600px; margin:0 auto 15px;">Мои публикации</h3>
                <div id="my-posts-list"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, arrayUnion, arrayRemove, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7C-GHyn0RsNBek4wmkzMzD_IAbim0DpU", authDomain: "pixel-7c9f0.firebaseapp.com", projectId: "pixel-7c9f0", storageBucket: "pixel-7c9f0.appspot.com", messagingSenderId: "1016081455742", appId: "1:1016081455742:web:8b6d312cfecd8d8467d62f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, postsGlobal = [];

        // Навигация
        window.nav = (id, el) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            if(id === 'profile') render(postsGlobal.filter(p => p.uid === user.uid), 'my-posts-list');
        };

        // Вход / Выход
        onAuthStateChanged(auth, (u) => {
            if(u) { 
                user = u; 
                document.getElementById('my-name').innerText = u.displayName; 
                document.getElementById('my-av').style.backgroundImage = `url(${u.photoURL})`; 
                initApp(); 
            } else { 
                signInWithPopup(auth, new GoogleAuthProvider()); 
            }
        });

        window.logout = () => {
            if(confirm("Выйти из аккаунта?")) {
                signOut(auth).then(() => location.reload());
            }
        };

        async function initApp() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                postsGlobal = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render(postsGlobal, 'feed-items');
                // Просмотры
                snap.docs.forEach(d => updateDoc(doc(db, "posts", d.id), { views: increment(1) }));
            });
        }

        function render(data, target) {
            const container = document.getElementById(target);
            container.innerHTML = "";
            data.forEach(p => {
                const isLiked = p.likes?.includes(user?.uid);
                container.innerHTML += `
                    <div class="post">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                            <div style="display:flex; gap:10px; align-items:center;">
                                <div style="width:35px; height:35px; border-radius:50%; background:url(${p.av}); background-size:cover;"></div>
                                <b style="font-size:15px;">${p.author}</b>
                            </div>
                            <i class="bi bi-three-dots" style="color:var(--gray)"></i>
                        </div>
                        <div style="font-size:16px; line-height:1.5;">${p.text.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>')}</div>
                        <div class="post-actions">
                            <div class="action" onclick="like('${p.id}', ${JSON.stringify(p.likes)})">
                                <i class="bi ${isLiked?'bi-heart-fill':'bi-heart'}" style="${isLiked?'color:#ff2d55':''}"></i> ${p.likes?.length || 0}
                            </div>
                            <div class="action"><i class="bi bi-chat"></i> ${p.comments?.length || 0}</div>
                            <div class="action"><i class="bi bi-graph-up"></i> ${p.views || 0}</div>
                            <div class="action" style="margin-left:auto;" onclick="alert('Скрыто')"><i class="bi bi-slash-circle"></i></div>
                        </div>
                    </div>`;
            });
        }

        window.sendPost = async () => {
            const t = document.getElementById('post-text').value;
            if(!t.trim()) return;
            await addDoc(collection(db, "posts"), { 
                text: t, author: user.displayName, av: user.photoURL, uid: user.uid, 
                likes: [], comments: [], views: 0, time: serverTimestamp() 
            });
            document.getElementById('post-text').value = "";
        };

        window.like = async (id, likes) => {
            const r = doc(db, "posts", id);
            await updateDoc(r, { likes: likes.includes(user.uid) ? arrayRemove(user.uid) : arrayUnion(user.uid) });
        };

        window.doSearch = (v) => render(postsGlobal.filter(p => p.text.toLowerCase().includes(v.toLowerCase())), 'search-results');
    </script>
</body>
</html>
